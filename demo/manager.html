<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaveBox | Demo Manager</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --error: #ff3366;
            --text: #ffffff;
            --text-dim: #a0a0b0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('../background.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            background: rgba(22, 22, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h1 {
            margin: 0 0 0.5rem;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: -1.5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .demo-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        p {
            color: var(--text-dim);
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.5;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            text-align: center;
        }

        .btn-launch {
            background: linear-gradient(45deg, var(--primary), #00a2ff);
            color: #000;
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.3);
        }

        .btn-launch:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 242, 255, 0.5);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .links a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: var(--primary);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="demo-badge">Experience Demo</div>
        <h1>RaveBox Control</h1>
        <p>Experience the ultimate VJ engine. This demo mode provides a fully interactive UI without hardware requirements.</p>

        <div class="action-btns">
            <a href="visualdmxweb.html" class="btn btn-launch">Launch Visualizer</a>
            <a href="setupweb.html" class="btn btn-secondary">System Setup</a>
            <a href="remote.html" class="btn btn-secondary">Remote Control</a>
        </div>

        <div class="links">
            <a href="#">About</a>
            <a href="#">Support</a>
            <a href="#">Hardware</a>
        </div>

        <div class="footer-note">
            UI Demo Only • No DMX Support • Ghost Audio Enabled
        </div>
    </div>

    <script>
        // Check for RaveBox hardware (Simulated for demo)
        window.addEventListener('load', () => {
            console.log("RaveBox Demo Manager Initialized");
        });
    </script>
</body>

</html>
