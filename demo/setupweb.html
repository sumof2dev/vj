<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaveBox | Demo Setup</title>
    <style>
        :root {
            --bg: #0f0f13;
            --panel: #1b1b22;
            --header: #25252e;
            --border: #333;
            --accent: #7c4dff;
            --accent-hover: #9e75ff;
            --text: #eee;
            --text-dim: #888;
            --danger: #ff4757;
            --success: #2ed573;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }

        #nav-panel {
            width: 80px;
            background: #0a0a0c;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 25px;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            color: #555;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.4);
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header-bar {
            height: 70px;
            background: var(--header);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .view-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #444;
            transform: translateY(-1px);
        }

        .btn.primary {
            background: var(--accent);
        }

        .btn.primary:hover {
            background: var(--accent-hover);
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .item-info h4 {
            margin: 0;
            font-size: 0.9rem;
        }

        .item-info p {
            margin: 4px 0 0;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .alert-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--danger);
            color: #fff;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            white-space: nowrap;
        }

        .alert-popup.visible {
            transform: translateX(-50%) translateY(0);
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        form input, form select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #0a0a0c;
            border: 1px solid var(--border);
            color: white;
            margin-bottom: 16px;
            outline: none;
        }

        form input:focus {
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div id="nav-panel">
        <a href="manager.html" class="nav-btn" title="Home">🏠</a>
        <div class="nav-btn active" onclick="showPanel('fixtures')" title="Fixtures">💡</div>
        <div class="nav-btn" onclick="showPanel('profiles')" title="Profiles">📄</div>
        <div class="nav-btn" onclick="showPanel('hardware')" title="Hardware">🔌</div>
    </div>

    <div id="main-content">
        <div class="header-bar">
            <div class="header-title">System Configuration</div>
            <button class="btn primary" onclick="triggerAlert()">Save Changes</button>
        </div>

        <div id="fixtures" class="view-panel active">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Stage Fixtures</div>
                    <button class="btn" onclick="openModal('fixture')">+ Add Fixture</button>
                </div>
                <div id="fixture-list">
                    <div class="list-item">
                        <div class="item-info">
                            <h4>RaveBeam 500</h4>
                            <p>Moving Head • Universe 1 • Ch 1-16</p>
                        </div>
                        <button class="btn" onclick="triggerAlert()">Edit</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="profiles" class="view-panel">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Device Profiles</div>
                    <button class="btn" onclick="openModal('profile')">+ Create Profile</button>
                </div>
                <div id="profile-list">
                    <div class="list-item">
                        <div class="item-info">
                            <h4>Generic RGB Par</h4>
                            <p>3 Channels • R, G, B</p>
                        </div>
                        <button class="btn" onclick="triggerAlert()">Edit</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="hardware" class="view-panel">
            <div class="card">
                <div class="card-title">DMX Interface</div>
                <form onsubmit="return false;">
                    <label>Controller Type</label>
                    <select disabled>
                        <option>Enttec Open DMX / USB Pro</option>
                    </select>
                    <label>Refresh Rate (Hz)</label>
                    <input type="number" value="40" disabled>
                    <p style="color: var(--danger); font-size: 0.8rem; font-weight: 700;">Hardware interface not detected.</p>
                </form>
            </div>
        </div>
    </div>

    <!-- Alert Popup -->
    <div class="alert-popup" id="alertPopup">You need the RaveBox for this function</div>

    <script>
        function showPanel(id) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function triggerAlert() {
            const popup = document.getElementById('alertPopup');
            popup.classList.add('visible');
            setTimeout(() => {
                popup.classList.remove('visible');
            }, 3000);
        }

        function openModal(type) {
            // Simulated modal - just adds a dummy item
            if (type === 'fixture') {
                const list = document.getElementById('fixture-list');
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="item-info">
                        <h4>New ${type.charAt(0).toUpperCase() + type.slice(1)}</h4>
                        <p>Configure ranges and channels</p>
                    </div>
                    <button class="btn" onclick="triggerAlert()">Edit</button>
                `;
                list.prepend(div);
            } else {
                triggerAlert();
            }
        }
    </script>
</body>

</html>
