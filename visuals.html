<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals Demo | RaveBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #050505;
            --surface: rgba(20, 20, 25, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- UI OVERLAYS --- */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .vj-title {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            pointer-events: auto;
        }

        .vj-title h1 {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            font-family: monospace;
        }

        /* --- CONTROLS --- */
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            pointer-events: auto;
        }

        .bottom-bar {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls-hidden .bottom-bar {
            transform: translateY(100px);
        }

        .audio-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 32px;
            width: 80px;
        }

        .bar {
            flex: 1;
            background: var(--primary);
            border-radius: 2px 2px 0 0;
            height: 2px;
            transition: height 0.05s ease-out;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-label {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: bold;
            letter-spacing: 1px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .primary-btn {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* --- MODAL / START SCREEN --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .start-card h2 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .start-card p {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* --- LIBRARY DRAWER --- */
        .library-drawer {
            position: absolute;
            top: 24px;
            right: 24px;
            bottom: 24px;
            width: 320px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: auto;
            z-index: 20;
        }

        .library-drawer.open {
            transform: translateX(0);
        }

        .library-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .library-tabs {
            display: flex;
            padding: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin: 16px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .library-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .shader-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shader-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .shader-item.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .shader-name {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .shader-meta {
            font-size: 9px;
            color: var(--text-dim);
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .bottom-bar {
                padding: 12px;
                gap: 12px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .audio-bars { display: none; }
            .library-drawer { width: calc(100% - 48px); }
        }
    </style>
</head>
<body>

    <div id="startModal" class="modal">
        <div class="start-card">
            <h2>Experience Visuals</h2>
            <p>Sync high-performance GLSL shaders to your device audio. Connect a microphone or share a tab with music to begin the demo.</p>
            <button class="btn primary-btn" style="width: 100%; justify-content: center; padding: 16px;" onclick="initAudio()">
                Start Performance
            </button>
        </div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div class="overlay" id="mainUI">
        <div class="header">
            <div class="vj-title">
                <h1>RaveBox // Visuals</h1>
                <div class="stats" id="perfStats">60 FPS • Disconnected</div>
            </div>
            <button class="btn" onclick="toggleLibrary()">
                Library
            </button>
        </div>

        <div class="controls-container">
            <div class="bottom-bar">
                <div class="audio-bars" id="eqBars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

                <div class="control-group">
                    <div class="control-label">Gain</div>
                    <input type="range" id="gainSlider" min="0" max="3" step="0.1" value="1.0">
                </div>

                <div class="control-group">
                    <div class="control-label">Style</div>
                    <div style="display: flex; gap: 4px;">
                        <button class="btn active" id="modeBase" onclick="setLayer('base')">Base</button>
                        <button class="btn" id="modeFx" onclick="setLayer('fx')">FX</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="control-label">Input</div>
                    <button class="btn" id="micBtn" onclick="toggleInput()">Mic / Tab</button>
                </div>

                <button class="btn" id="fsBtn" onclick="toggleFullscreen()">FS</button>
            </div>
        </div>
    </div>

    <div class="library-drawer" id="libraryDrawer">
        <div class="library-header">
            <div class="control-label">Shader Library</div>
            <button class="btn" style="padding: 4px 8px;" onclick="toggleLibrary()">X</button>
        </div>
        <div class="library-tabs">
            <div class="tab active" data-tab="base" onclick="filterLibrary('base')">BASE</div>
            <div class="tab" data-tab="fx" onclick="filterLibrary('fx')">FX</div>
        </div>
        <div class="library-content" id="libraryList">
            <!-- Shaders will be injected here -->
        </div>
    </div>

    <script>
        const APP_VERSION = "49260014"; // Stamped by deploy.sh
        // --- CONSTANTS & STATE ---
        const DEFAULT_BASE = `
precision highp float;
varying vec2 vUv;
uniform float u_time;
uniform float u_bass;
uniform float u_flux;
uniform vec2 u_resolution;

void main() {
    vec2 uv = vUv;
    float dist = distance(uv, vec2(0.5));
    float circle = smoothstep(0.2 + u_bass * 0.1, 0.18 + u_bass * 0.1, dist);
    vec3 color = vec3(uv.x, uv.y, sin(u_time) * 0.5 + 0.5);
    color += circle * vec3(1.0, 0.5, 0.0);
    color = (color - 0.2) / 0.8;
    color = clamp(color, 0.0, 1.0);
    gl_FragColor = vec4(color, 1.0);
}`;

        const DEFAULT_FX = `
precision highp float;
varying vec2 vUv;
uniform float u_time;
uniform float u_high;
uniform float u_vol;
void main() {
    vec2 uv = vUv;
    vec3 col = 0.5 + 0.5 * cos(u_time + uv.xyx + vec3(0,2,4));
    float noise = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453) * 0.1 * u_high;
    gl_FragColor = vec4(col, u_vol * 0.3 + noise);
}`;

        const VERTEX_SHADER = `
varying vec2 vUv;
void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
}`;

        const SHADER_LIBRARY = [
            { "id": "fractalrave", "name": "fractalrave.frag", "type": "base", "file": "library/base/fractalrave.frag" },
            { "id": "vj_shader_1774534200206", "name": "3d tunnel", "type": "base", "file": "library/base/vj_shader_1774534200206.frag" },
            { "id": "vj_shader_1774535157541", "name": "fractal galaxy", "type": "base", "file": "library/base/vj_shader_1774535157541.frag" },
            { "id": "base_stained_glass", "name": "base_stained_glass.frag", "type": "base", "file": "library/base/base_stained_glass.frag" },
            { "id": "base_mandala", "name": "base_mandala.frag", "type": "base", "file": "library/base/base_mandala.frag" },
            { "id": "vj_shader_1774500524039", "name": "vj_shader_1774500524039.frag", "type": "base", "file": "library/base/vj_shader_1774500524039.frag" },
            { "id": "vj_shader_1774532698270", "name": "nebula portal", "type": "base", "file": "library/base/vj_shader_1774532698270.frag" },
            { "id": "vj_shader_1774533715804", "name": "3d torus field", "type": "base", "file": "library/base/vj_shader_1774533715804.frag" },
            { "id": "base_lissajous", "name": "base_lissajous.frag", "type": "base", "file": "library/base/base_lissajous.frag" },
            { "id": "vj_shader_1774532754979", "name": "cyber grid", "type": "base", "file": "library/base/vj_shader_1774532754979.frag" },
            { "id": "base_neon_web", "name": "base_neon_web.frag", "type": "base", "file": "library/base/base_neon_web.frag" },
            { "id": "vj_shader_1774723795528", "name": "digital circuit", "type": "base", "file": "library/base/vj_shader_1774723795528.frag" },
            { "id": "vj_shader_1774536147141", "name": "menger sponge 3d", "type": "base", "file": "library/base/vj_shader_1774536147141.frag" },
            { "id": "vj_shader_1774500081403", "name": "vj_shader_1774500081403.frag", "type": "base", "file": "library/base/vj_shader_1774500081403.frag" },
            { "id": "fractal", "name": "fractal.frag", "type": "base", "file": "library/base/fractal.frag" },
            { "id": "vj_shader_1774533996474", "name": "bass reactive sphere", "type": "base", "file": "library/base/vj_shader_1774533996474.frag" },
            { "id": "base_voxel_maze", "name": "base_voxel_maze.frag", "type": "base", "file": "library/base/base_voxel_maze.frag" },
            { "id": "vj_shader_1774499787388", "name": "vj_shader_1774499787388.frag", "type": "base", "file": "library/base/vj_shader_1774499787388.frag" },
            { "id": "vj_shader_177420461200", "name": "nebula", "type": "base", "file": "library/base/vj_shader_1774720461200.frag" },
            { "id": "vj_shader_1774617644852", "name": "audio reactive lightning", "type": "fx", "file": "library/fx/vj_shader_1774617644852.frag" },
            { "id": "vj_shader_1774725939451", "name": "scrolling matrix rain style code, symbols", "type": "fx", "file": "library/fx/vj_shader_1774725939451.frag" },
            { "id": "vj_shader_1774617414295", "name": "kaliedoscope", "type": "fx", "file": "library/fx/vj_shader_1774617414295.frag" },
            { "id": "vj_shader_1774723868811", "name": "wireframe city overlay", "type": "fx", "file": "library/fx/vj_shader_1774723868811.frag" },
            { "id": "fx_neon_hex", "name": "fx_neon_hex.frag", "type": "fx", "file": "library/fx/fx_neon_hex.frag" },
            { "id": "vj_shader_1774617932720", "name": "bass hit reactive black point", "type": "fx", "file": "library/fx/vj_shader_1774617932720.frag" },
            { "id": "fx_wireframe_dna", "name": "fx_wireframe_dna.frag", "type": "fx", "file": "library/fx/fx_wireframe_dna.frag" }
        ];

        let state = {
            audioInited: false,
            activeLayer: 'base',
            gain: 1.0,
            smoothing: 0.8,
            inputMode: 'mic', // 'mic' or 'tab'
            fps: 60,
            libraryOpen: false,
            currentBase: DEFAULT_BASE,
            currentFx: DEFAULT_FX
        };

        const uniforms = {
            u_time: { value: 0 },
            u_clock: { value: 0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_bass: { value: 0 },
            u_flux: { value: 0 },
            u_vol: { value: 0 },
            u_high: { value: 0 },
            u_intensity: { value: 0 },
            u_dmxRot: { value: 0 },
            u_axis_a: { value: 0 },
            u_axis_b: { value: 0 },
            u_axis_c: { value: 0 },
            u_axis_d: { value: 0 },
            u_axis_e: { value: 0 }
        };

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('mainCanvas'), 
            antialias: false,
            powerPreference: 'high-performance'
        });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const baseMat = new THREE.ShaderMaterial({
            vertexShader: VERTEX_SHADER,
            fragmentShader: DEFAULT_BASE,
            uniforms: uniforms,
            depthWrite: false
        });
        const baseMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), baseMat);
        scene.add(baseMesh);

        const fxMat = new THREE.ShaderMaterial({
            vertexShader: VERTEX_SHADER,
            fragmentShader: DEFAULT_FX,
            uniforms: uniforms,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const fxMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fxMat);
        scene.add(fxMesh);

        // --- AUDIO ENGINE ---
        let audioCtx, analyser, dataArray;
        let agcPeak = 0.4; // Peak tracking for normalization
        let prevValues = { bass: 0, mid: 0, high: 0, vol: 0 };
        let smoothedValues = { bass: 0, flux: 0, vol: 0, high: 0 };
        let prevBins = [0, 0, 0, 0, 0, 0];

        async function initAudio() {
            try {
                // Cleanup previous context if any
                if (audioCtx) {
                    if (analyser) analyser.disconnect();
                    await audioCtx.close().catch(e => console.error(e));
                    audioCtx = null;
                    analyser = null;
                }

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                let stream;
                if (state.inputMode === 'mic') {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } else {
                    // System Audio Mode (Shared Tab)
                    // Strategy from oldshareaudio.html: request video+audio, then stop video
                    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    
                    if (stream.getAudioTracks().length === 0) {
                        alert("No system audio shared. Did you check the 'Share Audio' box in the browser popup?");
                        return;
                    }

                    // Stop the video track as we only need the audio
                    stream.getVideoTracks().forEach(track => track.stop());
                }

                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);

                state.audioInited = true;
                document.getElementById('startModal').classList.add('hidden');
                document.getElementById('perfStats').textContent = `60 FPS • ${state.inputMode.toUpperCase()}`;
                
                // Only start the animation loop once
                if (!window.animationStarted) {
                    window.animationStarted = true;
                    animate();
                }
            } catch (err) {
                console.error("Audio init failed:", err);
                alert("Permission denied or capture failed. " + (err.message || ""));
            }
        }

        function toggleInput() {
            state.inputMode = state.inputMode === 'mic' ? 'tab' : 'mic';
            document.getElementById('micBtn').textContent = state.inputMode === 'mic' ? 'Microphone' : 'Tab Audio';
            if (state.audioInited) {
                initAudio();
            }
        }

        function processAudio() {
            if (!analyser || !audioCtx) return;
            analyser.getByteFrequencyData(dataArray);

            // 1. AGC Peak Tracking (From oldshareaudio.html strategy)
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
            let avg = sum / dataArray.length;
            let currentAmp = avg / 255.0;

            if (currentAmp > agcPeak) {
                agcPeak = currentAmp;
            } else {
                agcPeak -= 0.0002; // Slow decay
            }
            if (agcPeak < 0.4) agcPeak = 0.4;
            let normFactor = 0.5 / agcPeak;

            // 2. Frequency Band Calculation (Nyquist-aware)
            const nyquist = audioCtx.sampleRate / 2;
            const binCount = analyser.frequencyBinCount;
            const bassEndIdx = Math.max(1, Math.floor(250 / (nyquist / binCount)));
            const midEndIdx = Math.max(bassEndIdx + 1, Math.floor(2000 / (nyquist / binCount)));
            
            let rawBass = 0;
            for (let i = 0; i < bassEndIdx; i++) rawBass += dataArray[i];
            rawBass = (rawBass / bassEndIdx / 255.0) * normFactor;

            let rawMid = 0;
            for (let i = bassEndIdx; i < midEndIdx; i++) rawMid += dataArray[i];
            rawMid = (rawMid / (midEndIdx - bassEndIdx) / 128.0) * normFactor;

            let rawHigh = 0;
            for (let i = midEndIdx; i < binCount; i++) rawHigh += dataArray[i];
            rawHigh = (rawHigh / (binCount - midEndIdx) / 64.0) * normFactor;

            let normVol = Math.min(1.0, (avg * normFactor) / 128.0);

            // 3. Smoothing and Flux
            const sf = 0.15; // Smoothing factor
            let bass = Math.min(1.0, rawBass) * state.gain;
            let mid = Math.min(1.0, rawMid) * state.gain;
            let high = Math.min(1.0, rawHigh) * state.gain;
            let vol = Math.min(1.0, normVol) * state.gain;

            // Flux calculation (Delta in energy)
            let flux = Math.max(0, bass - prevValues.bass) + Math.max(0, mid - prevValues.mid);
            prevValues = { bass, mid, high, vol };

            // Exponential smoothing
            smoothedValues.bass += (bass - smoothedValues.bass) * sf;
            smoothedValues.vol += (vol - smoothedValues.vol) * sf;
            smoothedValues.high += (high - smoothedValues.high) * sf;
            smoothedValues.flux += (flux - smoothedValues.flux) * sf;

            // 4. Update Uniforms
            uniforms.u_bass.value = Math.min(1.5, smoothedValues.bass);
            uniforms.u_flux.value = Math.min(1.5, smoothedValues.flux * 2.0); // Boost flux for reactivity
            uniforms.u_vol.value = Math.min(1.5, smoothedValues.vol);
            uniforms.u_intensity.value = smoothedValues.vol;
            uniforms.u_high.value = Math.min(1.5, smoothedValues.high);

            // Integrated clock modulation
            const speed = 1.0 + (smoothedValues.flux * 3.0);
            uniforms.u_clock.value += 0.016 * speed;

            // 5. Update UI Bins
            const barCount = 6;
            const bars = document.querySelectorAll('.bar');
            for(let i=0; i<barCount; i++) {
                let binVal = 0;
                let step = Math.floor(dataArray.length / barCount);
                for(let j=0; j<step; j++) binVal += dataArray[i*step + j];
                binVal = (binVal / step / 255.0) * normFactor;
                let smoothed = prevBins[i] * 0.7 + binVal * 0.3;
                prevBins[i] = smoothed;
                if(bars[i]) bars[i].style.height = `${Math.min(1.0, smoothed * state.gain) * 100}%`;
            }
        }

        // --- RENDER LOOP ---
        let lastTime = performance.now();
        let frames = 0;

        function animate() {
            const now = performance.now();
            frames++;
            if (now > lastTime + 1000) {
                state.fps = frames;
                document.getElementById('perfStats').textContent = `${state.fps} FPS • ${state.inputMode.toUpperCase()}`;
                frames = 0;
                lastTime = now;
            }

            uniforms.u_time.value = now * 0.001;
            
            processAudio();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // --- UI ACTIONS ---
        function setLayer(layer) {
            state.activeLayer = layer;
            document.getElementById('modeBase').classList.toggle('active', layer === 'base');
            document.getElementById('modeFx').classList.toggle('active', layer === 'fx');
            filterLibrary(layer);
        }

        function toggleLibrary() {
            state.libraryOpen = !state.libraryOpen;
            document.getElementById('libraryDrawer').classList.toggle('open', state.libraryOpen);
        }

        function filterLibrary(type) {
            const list = document.getElementById('libraryList');
            list.innerHTML = '';
            
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === type);
            });

            SHADER_LIBRARY.filter(s => s.type === type).forEach(shader => {
                const el = document.createElement('div');
                el.className = 'shader-item';
                el.innerHTML = `
                    <div class="shader-name">${shader.name}</div>
                    <div class="shader-meta">${shader.file}</div>
                `;
                el.onclick = () => loadShader(shader);
                list.appendChild(el);
            });
        }

        async function loadShader(shader) {
            try {
                const resp = await fetch(shader.file);
                if (!resp.ok) throw new Error("File not found");
                const code = await resp.text();
                
                if (shader.type === 'base') {
                    baseMat.fragmentShader = code;
                    baseMat.needsUpdate = true;
                } else {
                    fxMat.fragmentShader = code;
                    fxMat.needsUpdate = true;
                    fxMesh.visible = true;
                }
                toggleLibrary();
            } catch (err) {
                alert("Failed to load shader: " + shader.file);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event Listeners
        document.getElementById('gainSlider').addEventListener('input', (e) => {
            state.gain = parseFloat(e.target.value);
        });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        // Initialize Library
        filterLibrary('base');

        // Hide UI on idle
        let uiTimeout;
        window.addEventListener('mousemove', () => {
            document.getElementById('mainUI').classList.remove('controls-hidden');
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                if (!state.libraryOpen) document.getElementById('mainUI').classList.add('controls-hidden');
            }, 3000);
        });

    </script>
</body>
</html>
