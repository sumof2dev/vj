        // --- FULL SCREEN LASER OVERLAY (FIXED DATA SOURCE) ---
        function renderOverlay() {
            const cvs = document.getElementById('laser-overlay');
            const hud = document.getElementById('debug-hud');

            // 1. Check Visibility
            if (!debugMode) {
                cvs.style.display = 'none';
                return;
            }
            cvs.style.display = 'block';

            // 2. Resize
            if (cvs.width !== window.innerWidth || cvs.height !== window.innerHeight) {
                cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            }

            const ctx = cvs.getContext('2d');
            const w = cvs.width; const h = cvs.height;
            ctx.clearRect(0, 0, w, h);

            // 3. Safety Check
            if (!laserController || !laserController.config || !laserController.config.zones) return;

            let debugLines = [];
            let hasActivePattern = false;

            laserController.config.zones.forEach(zone => {
                // FIX: Universe logic matches LaserController
                const baseAddr = (parseInt(zone.address) || 1) - 1;

                // Helper to read from LaserController's universe array
                const getDmx = (offset, def) => {
                    if (offset === undefined) return def;
                    // universe is 1-based in controller logic (addr = startAddr + offset)
                    // So we access baseAddr + offset
                    return laserController.universe[baseAddr + offset] || def;
                };

                zone.channels.forEach(ch => {
                    // STRICT CHECK: Role must be pattern/pattern_2
                    if (ch.role !== 'pattern' && ch.role !== 'pattern_2') return;

                    // DATA CHECK: Must have vectors
                    if (!ch.ranges || !ch.ranges.some(r => r.drawingData && r.drawingData.length > 0)) return;

                    hasActivePattern = true;

                    // ROBUST MODIFIER LINKING
                    const findModifier = (targetRole, patternName) => {
                        const candidates = zone.channels.filter(c => c.role === targetRole);
                        if (candidates.length === 0) return null;
                        const pName = patternName.toLowerCase();
                        const isH2 = pName.includes('h2') || pName.includes('head 2') || pName.includes('head2');
                        return candidates.find(c => {
                            const cName = c.name.toLowerCase();
                            if (isH2 && (cName.includes('h2') || cName.includes('head 2'))) return true;
                            if (!isH2 && (cName.includes('h1') || cName.includes('head 1') || !cName.includes('h2'))) return true;
                            return false;
                        }) || candidates[0];
                    };

                    const zoomCh = findModifier('zoom', ch.name);
                    const rotCh = findModifier('rotation', ch.name);
                    const xCh = findModifier('x_pos', ch.name);
                    const yCh = findModifier('y_pos', ch.name);

                    // ADVANCED MODIFIERS
                    // We need to look for specific roles defined in config
                    // Twist, Dots, Rot X, Rot Y, Grating
                    const twistCh = findModifier(ch.name.includes('H2') || ch.name.includes('Head 2') ? 'twist_2' : 'twist', ch.name);
                    const dotsCh = findModifier(ch.name.includes('H2') || ch.name.includes('Head 2') ? 'dots_2' : 'dots', ch.name);
                    const rotXCh = findModifier(ch.name.includes('H2') || ch.name.includes('Head 2') ? 'rot_x_2' : 'rot_x', ch.name);
                    const rotYCh = findModifier(ch.name.includes('H2') || ch.name.includes('Head 2') ? 'rot_y_2' : 'rot_y', ch.name);
                    const gratingCh = findModifier(ch.name.includes('H2') || ch.name.includes('Head 2') ? 'grating_2' : 'grating', ch.name) || findModifier('movement', ch.name);

                    // Drawing Logic: Needs specific offset checks for H1 "Drawing" pairs
                    // We look for channels with role 'drawing' in this zone.
                    const drawingChannels = zone.channels.filter(c => c.role === 'drawing');
                    // According to user: Delay is Offset 14, H1 is Offset 15.
                    // We'll try to find them by name or offset if possible, or just grab pairs.
                    // Let's rely on the explicit values mentioned:
                    const drawEnableCh = drawingChannels.find(c => c.offset === 14 || c.name.toLowerCase().includes('delay'));
                    const drawSpeedCh = drawingChannels.find(c => c.offset === 15 || c.name.toLowerCase().includes('h1'));

                    // READ VALUES
                    const patVal = getDmx(ch.offset, 0);
                    const zoomVal = getDmx(zoomCh?.offset, 127);
                    const rotVal = getDmx(rotCh?.offset, 127);
                    const xVal = getDmx(xCh?.offset, 127);
                    const yVal = getDmx(yCh?.offset, 127);

                    const twistVal = getDmx(twistCh?.offset, 0);
                    const dotsVal = getDmx(dotsCh?.offset, 0);
                    const rotXVal = getDmx(rotXCh?.offset, 0);
                    const rotYVal = getDmx(rotYCh?.offset, 0);
                    const gratingVal = getDmx(gratingCh?.offset, 0);

                    // Drawing Speed
                    let drawMaxPct = 1.0;
                    const drawEnableVal = getDmx(drawEnableCh?.offset, 0);
                    if (drawEnableVal >= 64) {
                        const drawSpeedVal = getDmx(drawSpeedCh?.offset, 128); // 128 default
                        // Map 128 (slow) ... 159 (fast).
                        // Use a persistent timer based on speed.
                        const spd = Math.max(1, drawSpeedVal - 128 + 1);
                        // Using Date.now for simple cycling
                        const cycleTime = 5000 / spd; // fast = shorter cycle
                        drawMaxPct = (Date.now() % cycleTime) / cycleTime;
                    }

                    // Determine Aspect Ratio & Bounds from Config
                    let xMin = 0, xMax = 255, yMin = 0, yMax = 255;
                    if (xCh) { xMin = xCh.min !== undefined ? xCh.min : 0; xMax = xCh.max !== undefined ? xCh.max : 255; }
                    if (yCh) { yMin = yCh.min !== undefined ? yCh.min : 0; yMax = yCh.max !== undefined ? yCh.max : 255; }

                    const rangeX = Math.max(1, xMax - xMin);
                    const rangeY = Math.max(1, yMax - yMin);

                    const targetAspect = rangeX / rangeY;
                    const screenAspect = w / h;

                    let drawW, drawH;
                    if (targetAspect > screenAspect) {
                        drawW = w;
                        drawH = w / targetAspect;
                    } else {
                        drawH = h;
                        drawW = h * targetAspect;
                    }

                    // FIND RANGE
                    const range = ch.ranges.find(r => patVal >= r.min && patVal <= r.max);

                    const headLabel = (ch.role === 'pattern_2') ? "Pattern H2" : "Pattern H1";
                    if (!range || !range.drawingData || range.drawingData.length === 0) {
                        debugLines.push(`${headLabel}: Val ${patVal} (No Data)`);
                        return;
                    }

                    debugLines.push(`${headLabel}: ${range.name} (V:${patVal})`);

                    // SELECT FRAME
                    let points = [];
                    if (range.mode === 'play_thru' || range.mode === 'anim') {
                        const fIdx = Math.floor(Date.now() / 50) % range.drawingData.length;
                        points = range.drawingData[fIdx];
                    } else {
                        let idx = patVal - range.min;
                        if (idx < 0) idx = 0;
                        if (idx >= range.drawingData.length) idx = range.drawingData.length - 1;
                        points = range.drawingData[idx];
                    }

                    if (!points || points.length === 0) return;

                    // DRAW
                    ctx.strokeStyle = (ch.role === 'pattern_2') ? '#00FFFF' : '#00FF00';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 15;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath();

                    // Force center for debug visualization (ignore DMX position)
                    const offX = 0;
                    const offY = 0;

                    // TRANSFORM
                    const scale = (zoomVal / 127);

                    // Apply Twist
                    if (twistVal > 0) {
                        // Apply to a copy to avoid mutating source if it was ref
                        points = applyTwist(JSON.parse(JSON.stringify(points)), twistVal);
                    }

                    // Apply 3D Rotation & Z-Rot
                    // We replace the simple Z-rot logic with our 3D helper
                    const cx = w / 2; const cy = h / 2;

                    // Drawing limit
                    const limit = Math.floor(points.length * drawMaxPct);
                    let drawPoints = points.slice(0, Math.max(2, limit));

                    // Grating / Movement Multi-pass
                    // If grating > 0, we draw multiple times with offsets
                    let passes = 1;
                    let spread = 0;
                    if (gratingVal > 0) {
                        passes = 3; // Example: 3 echoes
                        spread = (gratingVal / 255) * 100; // Spread amount
                    }

                    for (let pass = 0; pass < passes; pass++) {
                        let passOffsetX = 0;
                        let passOffsetY = 0;
                        if (passes > 1) {
                            passOffsetX = (pass - 1) * spread;
                            passOffsetY = (pass - 1) * spread * 0.5;
                        }

                        ctx.beginPath();
                        let first = true;

                        // Dots Mode: Draw points
                        if (dotsVal > 20) {
                            ctx.fillStyle = ctx.strokeStyle;
                            drawPoints.forEach(p => {
                                const pt = rotate3D(p.x * scale, p.y * scale, 0, rotXVal, rotYVal, rotVal);
                                const sx = cx + pt.x + offX + passOffsetX; // Apply manual offsets
                                const sy = cy - pt.y + offY + passOffsetY; // Invert Y for screen

                                // Map DMX 0-255 to xMin-xMax, then to screen coords...
                                // Wait, simple implementation:
                                // Map X/Y Pos DMX to screen offset
                                let finalX = sx + ((xVal - 127) / 127 * (w / 2));
                                let finalY = sy - ((yVal - 127) / 127 * (h / 2));

                                ctx.beginPath();
                                ctx.arc(finalX, finalY, 2, 0, Math.PI * 2);
                                ctx.fill();
                            });
                        } else {
                            // Line Mode
                            drawPoints.forEach(p => {
                                const pt = rotate3D(p.x * scale, p.y * scale, 0, rotXVal, rotYVal, rotVal);

                                // Map X/Y Pos DMX (simple translation)
                                let finalX = cx + pt.x + ((xVal - 127) / 127 * (w / 2)) + passOffsetX;
                                let finalY = cy - pt.y - ((yVal - 127) / 127 * (h / 2)) + passOffsetY;

                                if (first) { ctx.moveTo(finalX, finalY); first = false; }
                                else { ctx.lineTo(finalX, finalY); }
                            });
                            ctx.stroke();
                        }
                    }

                    // Skip default draw
                    return;

                    /*
                    // OLD LOGIC
                    const rotRad = ((rotVal - 127) / 127) * Math.PI;
                    const cr = Math.cos(rotRad); const sr = Math.sin(rotRad);
                    const cx = w / 2; const cy = h / 2;

                    let penDown = false;
                    points.forEach(p => {
                        if (p.x === null) { penDown = false; return; }
                        // ... old drawing code ...
                    });
                    ctx.stroke();
                    */
                });
            });

            if (hud.style.display !== 'none') {
                if (!hasActivePattern) {
                    document.getElementById('debug-pat-name').innerText = "Scanning...";
                    document.getElementById('debug-val').innerText = "--";
                } else {
                    document.getElementById('debug-pat-name').innerHTML = debugLines.join("<br>");
                    document.getElementById('debug-ch-name').innerText = "Multi-Head";
                    document.getElementById('debug-val').innerText = "";
                }
            }
        }

        function animate() {
            try {
                // Moved requestAnimationFrame to the END to prevent infinite error loops
                const delta = clock.getDelta();
                const elapsedTime = clock.getElapsedTime();

                updateAudioLevel();

                // --- DETECT BEAT ---
                // --- DETECT BEAT & BUILDUP ---
                const isBeat = beatDetector.update(rawBassLevel, delta);
                const isBuildup = buildupDetector.update(rawAudioLevel, delta);
                const strobeValue = handleStrobe(isBeat, delta);

                // --- REFINED DROP DETECTION (Spectral Flux) ---
                // Calculate positive change in energy across bands (Flux)
                let flux = 0;
                flux += Math.max(0, rawBassLevel - lastRawBassLevel);
                flux += Math.max(0, rawMidLevel - lastRawMidLevel);
                flux += Math.max(0, rawHighLevel - lastRawHighLevel);

                // Configurable drop threshold
                let dropThresh = 0.6;
                if (laserController.config && laserController.config.dropLikelihood !== undefined) {
                    dropThresh = 0.95 - (laserController.config.dropLikelihood / 100.0) * 0.5;
                }

                // IMPROVED DROP LOGIC:
                // If we are in a buildup, lower the threshold slightly to catch the drop
                if (isBuildup || (buildupDetector.duration > 1.0)) {
                    dropThresh *= 0.85;
                }

                // Condition A: Standard Volume Drop (High volume after silence)
                const isVolDrop = (rawAudioLevel > dropThresh && lastRawAudioLevel < (dropThresh * 0.6));

                // Condition B: Spectral Flux (Sudden EQ Shift)
                const isFluxDrop = (flux > 0.35 && rawAudioLevel > 0.4);

                let isDrop = isVolDrop || isFluxDrop;

                // FIX: Disable drops in Idle/Ghost mode
                if (audioMode === 0) isDrop = false;

                const adjustedLaserSpeed = speedMultiplier;

                // Update Hardware Laser
                laserController.update(delta, rawAudioLevel, rawBassLevel, rawMidLevel, rawHighLevel, isBeat, intensity, strobeEnabled, adjustedLaserSpeed, isDrop, sensitivity, strobeValue);

                // Auto Mode & Visual Switching
                handleAutoMode(delta, audioLevel, bassLevel, highLevel, isBeat, isDrop, midLevel, flux);

                // --- VIBE DETECTION FOR DEBUG ---
                let dbgVibe = 'mid';
                if (audioLevel < 0.4) dbgVibe = 'chill';
                else if (bassLevel > 0.7) dbgVibe = 'bass high';
                else if (audioLevel > 0.7) dbgVibe = 'treble high';
                else if (audioLevel > 0.6) dbgVibe = 'high';
                if (isDrop) dbgVibe = 'drop';

                // --- DEBUG HUD UPDATES ---
                const hudVibe = document.getElementById('debug-vibe');
                if (hudVibe) hudVibe.innerHTML = `Vibe: <span style="${dbgVibe.includes('high') ? 'color:#FF5555' : (dbgVibe === 'drop' ? 'color:#00FFFF' : 'color:#FFFFFF')}">${dbgVibe}${isBuildup ? ' (Build)' : ''}</span>`;

                const hudAgc = document.getElementById('debug-agc');
                if (hudAgc) hudAgc.innerText = `AGC: ${agcPeak.toFixed(2)}`;

                const hudVol = document.getElementById('debug-level');
                if (hudVol) hudVol.innerText = `Vol: ${audioLevel.toFixed(2)}`;

                // --- LOGGING ---
                if (isLogging) {
                    let row = [
                        elapsedTime.toFixed(3),
                        rawAudioLevel.toFixed(3), rawBassLevel.toFixed(3), rawMidLevel.toFixed(3), rawHighLevel.toFixed(3),
                        audioLevel.toFixed(3), bassLevel.toFixed(3), midLevel.toFixed(3), highLevel.toFixed(3),
                        dbgVibe,
                        currentBgMode, currentFgMode,
                        flux.toFixed(3), isDrop ? 1 : 0, strobeValue.toFixed(2)
                    ];
                    if (laserController && laserController.config && laserController.config.zones) {
                        laserController.config.zones.forEach(z => {
                            z.channels.forEach(ch => {
                                const addr = (parseInt(z.address) - 1) + parseInt(ch.offset);
                                row.push(laserController.universe[addr] || 0);
                            });
                        });
                    }
                    sessionLog.push(row);
                }

                // Update FPS
                const fpsEl = document.getElementById('debug-fps');
                if (fpsEl) fpsEl.innerText = `FPS: ${Math.round(1 / delta)}`;

                updateFgRadiantMandala(delta, elapsedTime, audioLevel, intensity);
                updateFgTorusKnot(delta, elapsedTime, audioLevel, intensity);
                updateFgGameOfLife(delta, elapsedTime, audioLevel, intensity, isBeat);
                updateFgShootingLines(delta, elapsedTime, audioLevel, intensity, isBeat);

                const allMaterials = [
                    sacredGeoMaterial, geoPatternsMaterial,
                    triGridOverlayMaterial, prismOverlayMaterial,
                    tunnelShaderMaterial, mandalaShaderMaterial, gearsShaderMaterial, dotsShaderMaterial, hyperTunnelShaderMaterial,
                    bgLiquidCrystalMat, bgDigitalGridMat, bgFloatingCubesMat,
                    fgScrollingCodeMat, fgWireframeDNAMat,
                    fgMatrixRainMat, fgWireframeTerrainMat, ovScanLinesMat, ovEnergyWavesMat, fgElasticMat
                ];
                const audioUniforms = {
                    u_time: elapsedTime,
                    u_speed: speedMultiplier,
                    u_audioLevel: audioLevel,
                    u_bass: bassLevel,
                    u_mids: midLevel,
                    u_highs: highLevel,
                    u_intensity: intensity,
                    u_noise: noiseLevel
                };
                allMaterials.forEach(mat => {
                    if (!mat) return;
                    for (const key in audioUniforms) {
                        if (mat.uniforms[key]) {
                            mat.uniforms[key].value = audioUniforms[key];
                        }
                    }
                });

                if (kaleidPass.material) {
                    const u = kaleidPass.material.uniforms;
                    u.u_intensity.value = intensity;
                    u.u_bass.value = bassLevel;
                    if (kaleidPass.enabled) {
                        u.u_segments.value = kaleidSegments;
                        u.u_rotation.value += kaleidRotationSpeed * delta * speedMultiplier * 0.1;
                    }
                }

                if (swirlPass.material) {
                    const u = swirlPass.material.uniforms;
                    u.u_time.value = elapsedTime;
                    u.u_audioLevel.value = audioLevel;
                    u.u_intensity.value = intensity;
                    u.u_speed.value = speedMultiplier;
                    if (u.u_centerOffset) u.u_centerOffset.value.set(0, 0);
                }

                if (fractalPass.material) {
                    const u = fractalPass.material.uniforms;
                    u.u_time.value = elapsedTime;
                    u.u_audioLevel.value = audioLevel;
                    u.u_bass.value = bassLevel;
                    u.u_intensity.value = intensity;
                    u.u_speed.value = speedMultiplier;
                }

                if (spherePass.material) {
                    const u = spherePass.material.uniforms;
                    u.u_time.value = elapsedTime;
                    u.u_audioLevel.value = audioLevel;
                    u.u_bass.value = bassLevel;
                    u.u_intensity.value = intensity;
                }

                if (infiniteMirrorsPass.material) {
                    const u = infiniteMirrorsPass.material.uniforms;
                    u.u_time.value = elapsedTime;
                    u.u_audioLevel.value = audioLevel;
                    u.u_intensity.value = intensity;
                    if (u.u_rotation) u.u_rotation.value = elapsedTime * 0.2 * speedMultiplier;
                }

                if (blackPointPass) {
                    blackPointPass.uniforms.u_blackPoint.value = globalBlackPoint;
                }
                composerFg.render(delta);

                lastAudioLevel = audioLevel;
                lastBassLevel = bassLevel;
                lastHighLevel = highLevel;
                lastRawAudioLevel = rawAudioLevel;
                lastRawBassLevel = rawBassLevel;
                lastRawHighLevel = rawHighLevel;
                // Only schedule next frame if we rendered successfully
                requestAnimationFrame(animate);

            } catch (e) {
                console.error("Critical Render Error - Loop Stopped:", e);
                infoOverlay.innerHTML = "A render error occurred. Visuals stopped.";
                infoOverlay.style.opacity = '1';
                infoOverlay.style.display = 'block';
                infoOverlay.style.pointerEvents = 'auto';
            }
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').then(registration => { console.log('ServiceWorker registration successful with scope: ', registration.scope); }, err => { console.log('ServiceWorker registration failed: ', err); }); }); }

        // --- Start App ---
        if (!(window.WebGLRenderingContext && (document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl')))) {
            infoOverlay.innerHTML = "Error: WebGL is not supported on your browser.";
            infoOverlay.style.opacity = '1';
        } else {
            init();
        }
    </script>
</body>
