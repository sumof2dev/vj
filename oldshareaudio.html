    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #visual-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #left-visual {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            /* Middle Layer */
            pointer-events: none;
        }

        #canvasFg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
            /* Top Layer */
        }

        #strobe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }

        #info-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            transition: opacity 0.3s ease-out;
            pointer-events: auto;
            z-index: 10001;
            cursor: pointer;
            display: none;
        }

        /* Settings Button (Gear Icon) */
        #settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10002;
            /* Above everything */
            backdrop-filter: blur(5px);
        }

        /* Backdrop to catch clicks when toolbar is open */
        #toolbar-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            /* Dim background slightly */
            z-index: 9999;
            display: none;
            pointer-events: auto;
        }

        #toolbar-backdrop.active {
            display: block;
        }

        #toolbar {
            position: absolute;
            top: 70px;
            /* Below settings button */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: white;
            transition: opacity 0.3s, visibility 0.3s;
            opacity: 0;
            visibility: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10000;
            width: 90%;
            max-width: 800px;
            box-sizing: border-box;
            max-height: 80vh;
            overflow-y: auto;
        }

        #toolbar.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Close button inside toolbar */
        #close-toolbar-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .toolbar-section {
            width: 100%;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toolbar-section:last-child {
            border-bottom: none;
        }

        .toolbar-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            text-align: center;
        }

        .toolbar-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #fff;
            cursor: pointer;
            border-radius: 50%;
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: #fff;
            cursor: pointer;
            border-radius: 50%;
        }

        .toggle-button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100px;
            text-align: center;
            white-space: nowrap;
        }

        .toggle-button.active {
            background: #4A90E2;
            border-color: #4A90E2;
        }

        .toggle-button.fx-active {
            background: #E24A90;
            border-color: #E24A90;
        }

        .toggle-button.random-active {
            background: #904AE2;
            border-color: #904AE2;
        }

        .toggle-button.ov-active {

            border-color: #4AE290;
        }

        select {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 7px 8px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        select option {
            background: #333;
            color: white;
        }

        /* FULL SCREEN LASER OVERLAY */
        #laser-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.9;
            mix-blend-mode: screen;
        }

        #debug-hud {
            position: absolute;
            top: 10px;

            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            border: 1px solid #4AE290;
            display: none;
            box-shadow: 0 0 10px rgba(74, 226, 144, 0.2);
        }
    </style>
</head>

<body>

    <script id="sharedBasicVertex" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    <script id="sharedFullscreenVertex" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <script id="shootingLinesVertex" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying vec3 vColor;
        // instanceColor attribute is auto-injected by Three.js when present on mesh
        
        void main() {
            vUv = uv;
            vColor = instanceColor; 
            gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="instancedVertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            // instanceMatrix is an attribute automatically added by THREE.InstancedMesh
            gl_Position = projectionMatrix * viewMatrix * modelMatrix * instanceMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="shootingLinesFragment" type="x-shader/x-fragment">
        varying vec2 vUv;
        varying vec3 vColor;
        uniform float u_audioLevel;
        uniform float u_intensity;
        void main() {
            // Use the passed instance color
            // Lower alpha for semi-transparent look, slightly boosted by audio
            float alpha = 0.6 + u_audioLevel * 0.4;
            
            // Safety: Ensure we don't render black invisible lines if buffer is 0
            vec3 finalColor = vColor;
            if (length(finalColor) < 0.1) {
                finalColor = vec3(1.0); // Fallback to white if color is missing
            }
            
            gl_FragColor = vec4(finalColor, alpha);
        }
    </script>

    <script id="bgLiquidCrystalFragment" type="x-shader/x-fragment">
        varying vec2 vUv;
        uniform float u_time; uniform float u_speed; uniform float u_intensity; uniform float u_mids; uniform float u_highs; uniform vec2 u_resolution;
        vec3 hslToRgb(float h, float s, float l) { vec3 rgb = clamp(abs(mod(h * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0); return l + s * (rgb - 0.5) * (1.0 - abs(2.0 * l - 1.0)); }
        float random(vec2 p) { return fract(sin(dot(p.xy, vec2(12.9898, 78.233))) * 43758.5453123); }
        float noise(vec2 p) { vec2 i = floor(p); vec2 f = fract(p); float a = random(i); float b = random(i + vec2(1.0, 0.0)); float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0)); vec2 u = f * f * (3.0 - 2.0 * f); return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.y * u.x; }
        void main() {
            vec2 uv = vUv - 0.5; uv.x *= u_resolution.x / u_resolution.y;
            float time = u_time * 0.2 * u_speed;
            float scale = 5.0;
            float n = noise(uv * scale + time);
            float angle = n * 2.0 * 3.14159;
            angle += u_mids * u_intensity * 2.0;
            float pattern = 0.5 + 0.5 * sin(angle * (10.0 + u_highs * 10.0));
            float hue = fract(time * 0.1 + n * 0.5);
            float lightness = 0.3 + pattern * 0.3;
            vec3 color = hslToRgb(hue, 0.9, lightness);
            float alpha = smoothstep(0.3, 0.6, pattern);
            gl_FragColor = vec4(color, alpha);
        }
    </script>

    <script id="bgDigitalGridFragment" type="x-shader/x-fragment">
        varying vec2 vUv;
        uniform float u_time; uniform float u_speed; uniform float u_intensity; uniform float u_audioLevel; uniform float u_bass; uniform float u_highs; uniform vec2 u_resolution;
        vec3 hslToRgb(float h, float s, float l) { vec3 rgb = clamp(abs(mod(h * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0); return l + s * (rgb - 0.5) * (1.0 - abs(2.0 * l - 1.0)); }
        void main() {
            vec2 uv = (vUv - 0.5) * 2.0;
            uv.x *= u_resolution.x / u_resolution.y;
            float time = u_time * u_speed;
            uv.y += 0.5;
            float horizon = uv.y;
            if (abs(horizon) < 0.05) horizon = 0.05;
            uv /= (horizon * (2.0 + u_bass * u_intensity));
            uv.y -= time * 0.5;
            float gridSpacing = 10.0;
            vec2 gridUV = fract(uv * gridSpacing);
            vec2 gridDist = 1.0 - abs(gridUV - 0.5) * 2.0;
            float gridLine = max(gridDist.x, gridDist.y);
            float thickness = 0.05 + u_highs * u_intensity * 0.1;
            gridLine = smoothstep(thickness, thickness + 0.02, gridLine);
            float glow = 1.0 - length(uv * 0.5);
            gridLine *= (0.5 + glow * 0.5);
            float hue = fract(time * 0.1 + uv.y * 0.01);
            float lightness = 0.4 + gridLine * 1.5 + (u_audioLevel * 0.6);
            vec3 color = hslToRgb(hue, 1.0, lightness);
            float alpha = smoothstep(0.1, 0.2, lightness) * 0.9;
            gl_FragColor = vec4(color, alpha);
        }
    </script>

    <script id="sacredGeoVertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    <script id="sacredGeoFragmentShader" type="x-shader/x-fragment">
        varying vec2 vUv;
        uniform float u_time;
        uniform float u_audioLevel;
        uniform float u_bass;
        uniform float u_mids;
        uniform float u_highs;
        uniform float u_intensity;
        uniform float u_speed;
        uniform vec2 u_resolution;
        
        const float PI = 3.14159265359;

        vec3 hslToRgb(float h, float s, float l) {
            vec3 rgb = clamp(abs(mod(h * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
            return l + s * (rgb - 0.5) * (1.0 - abs(2.0 * l - 1.0));
        }
        
        mat2 rotate2d(float angle) { return mat2(cos(angle), -sin(angle), sin(angle), cos(angle)); }

        // SDF Functions
        float flowerOfLife(vec2 uv, float scale) {
            uv *= scale;
            vec2 r = vec2(1.0, 1.7320508);
            vec2 h = r * 0.5;
            vec2 a = mod(uv, r) - h;
            vec2 b = mod(uv - h, r) - h;
            vec2 gv = dot(a, a) < dot(b, b) ? a : b;
            float d = length(gv);
            return smoothstep(0.05, 0.0, abs(d - 0.5) - 0.02);
        }
        
        float fibSpiral(vec2 uv, float time) {
            float r = length(uv);
            float a = atan(uv.y, uv.x);
            float spiral = sin(a * 5.0 - log(r) * 10.0 + time);
            return smoothstep(0.4, 0.6, spiral) * smoothstep(0.0, 0.5, r);
        }

        void main() {
            vec2 uv = (vUv - 0.5) * 2.0;
            uv.x *= u_resolution.x / u_resolution.y;
            
            float time = u_time * 0.2 * u_speed;
            uv *= rotate2d(time * 0.1);
            
            // 1. Flower of Life
            float flower = flowerOfLife(uv, 3.0 + u_bass * 2.0);
            
            // 2. Spiral
            float spiral = fibSpiral(uv, time * 2.0);
            
            // 3. Seed of Life (Center)
            float seed = 0.0;
            for(float i=0.0; i<6.0; i++) {
                float ang = i * PI / 3.0;
                vec2 offset = vec2(cos(ang), sin(ang)) * 0.25;
                seed += smoothstep(0.02, 0.0, abs(length(uv - offset) - 0.25) - 0.005);
            }
            seed += smoothstep(0.02, 0.0, abs(length(uv) - 0.25) - 0.005);
            
            // --- FIXED: CYCLING LOGIC ---
            // Cycle through 3 shapes over time
            float cycleSpeed = 0.2; 
            float shapeIndex = mod(time * cycleSpeed * 10.0, 3.0);
            float fade = smoothstep(0.7, 1.0, fract(time * cycleSpeed * 10.0)); // Soft transition
            
            float pattern = 0.0;
            
            if (shapeIndex < 1.0) {
                pattern = mix(flower, spiral, fade);
            } else if (shapeIndex < 2.0) {
                pattern = mix(spiral, seed, fade);
            } else {
                pattern = mix(seed, flower, fade);
            }
            
            // Audio reactivity for the pattern intensity
            pattern *= (0.5 + u_mids * 0.5);

            // Dark Colors: Deep Purple/Teal
            float hue = 0.55 + 0.1 * sin(time * 0.2 + length(uv));
            float lightness = pattern * (0.4 + u_intensity * 0.4); 
            
            vec3 color = hslToRgb(hue, 0.8, lightness);
            float alpha = smoothstep(0.1, 0.8, pattern + 0.1); 
            
            gl_FragColor = vec4(color, alpha);
        }
    </script>

    <script id="fgWireframeDNAFragment" type="x-shader/x-fragment">
        varying vec2 vUv; uniform float u_time; uniform float u_speed; uniform float u_intensity; uniform float u_audioLevel; uniform float u_bass; uniform float u_mids; uniform vec2 u_resolution;
        mat2 rot(float a) { return mat2(cos(a), -sin(a), sin(a), cos(a)); }
        void main() {
            vec2 uv = (vUv - 0.5) * 2.0;
            uv.x *= u_resolution.x / u_resolution.y;
            float time = u_time * u_speed;
            uv *= rot(time * 0.2);
            float wave = sin(uv.x * 3.0 + time) * 0.5;
            float wave2 = sin(uv.x * 3.0 + time + 3.14) * 0.5;
            float d1 = abs(uv.y - wave);
            float d2 = abs(uv.y - wave2);
            float line = smoothstep(0.03, 0.01, d1) + smoothstep(0.03, 0.01, d2);
            float stepX = 0.4;
            float gridX = fract(uv.x / stepX);
            if (gridX < 0.1 && uv.y < max(wave, wave2) && uv.y > min(wave, wave2)) { line += 1.0; }
            line *= (0.3 + u_audioLevel * 0.7);
            vec3 col = mix(vec3(0.0, 1.0, 1.0), vec3(1.0, 0.0, 1.0), sin(uv.x + time) * 0.5 + 0.5);
            gl_FragColor = vec4(col * line, line * 0.8);
        }
    </script>
    <script id="fractalFoldFragmentShader" type="x-shader/x-fragment">
        varying vec2 vUv;
        uniform sampler2D tDiffuse;
        uniform float u_time;
        uniform float u_audioLevel;
        uniform float u_bass;
        uniform float u_intensity;
        uniform float u_speed;
        uniform vec2 u_resolution;

        mat2 rot(float a) { return mat2(cos(a), -sin(a), sin(a), cos(a)); }

        void main() {
            vec2 uv = vUv - 0.5;
            // Correct aspect ratio for the calculations
            uv.x *= u_resolution.x / u_resolution.y;

            float time = u_time * 0.1 * u_speed;
            
            // Audio Reactivity: Zoom slightly on bass
            float zoom = 1.0 - (u_bass * 0.2 * u_intensity);
            uv *= zoom;

            // Fractal Folding Logic
            // We fold the space 3 times to create a crystal/sacred geo reflection
            float angle = time + u_audioLevel * 0.5;
            
            for(int i = 0; i < 3; i++) {
                uv = abs(uv); // Mirror
                uv -= 0.25 * u_intensity; // Offset folding plane
                uv *= rot(angle * 0.5); // Rotate folding plane
            }

            // Map back to 0-1 range for texture sampling
            // We use absolute/fract math to ensure we mirror-repeat the texture edges
            // instead of hitting black pixels
            uv.x /= u_resolution.x / u_resolution.y; // Un-correct aspect

                     if (charUv.x > border && charUv.x < 1.0-border && charUv.y > border && charUv.y < 1.0-border) {

                         else if (colorRnd > 0.7) color = vec3(1.0, 1.0, 1.0); // White

    <script>

        const VIBE_HISTORY_SIZE = 15;

        let vibeTrebleHistory = new Array(5).fill(0);

        let vibeState = { current: "clean", wobbleFrames: 0, holdTimer: 0 };

        function analyzeVibe(bass, mid, treble) {
            vibeBassHistory.shift(); vibeBassHistory.push(bass);
            vibeTrebleHistory.shift(); vibeTrebleHistory.push(treble);

            let bassVolatility = 0;
            for (let i = 1; i < vibeBassHistory.length; i++) bassVolatility += Math.abs(vibeBassHistory[i] - vibeBassHistory[i - 1]);

            const avgTreble = vibeTrebleHistory.reduce((a, b) => a + b, 0) / vibeTrebleHistory.length;
            const isLaser = (treble > 0.6) && (treble > avgTreble * 1.5);
            const isHeavyBass = bass > 0.6;
            const isWobbling = isHeavyBass && (bassVolatility > 2.0);
            const isImpact = (bass > 0.8) && (vibeBassHistory[VIBE_HISTORY_SIZE - 2] < 0.5);

            if (isLaser) detectedVibe = "aliens";

                vibeState.wobbleFrames = Math.max(0, vibeState.wobbleFrames - 1);

                vibeState.holdTimer = 10;

        function analyzePatterns(configData) {

                // High Density (> 5 points per unit) is good
                if (g.density > 5) score *= 1.5;
                if (g.density > 15) score *= 1.5;
            }

            // 3. SHAPE BIAS
            // Chill -> Prefer balanced shapes (not too tall/wide)
            if (vibe === 'chill') {
                if (g.isTall || g.isWide) score *= 0.3;
                // Boost circles/squares (approx 1:1 aspect)
                if (Math.abs(g.bounds.width - g.bounds.height) < 0.2) score *= 1.4;
            }

            // 4. PREFER LARGE SHAPES FOR DROPS
            if (vibe === 'drop') {
                if (g.bounds.width > 0.8 || g.bounds.height > 0.8) score *= 1.5;
            }

            return score;
        }

        const PATTERN_LIB = {
            'square': [{ x: -0.5, y: -0.5 }, { x: 0.5, y: -0.5 }, { x: 0.5, y: 0.5 }, { x: -0.5, y: 0.5 }, { x: -0.5, y: -0.5 }],
            'triangle': [{ x: 0, y: -0.5 }, { x: 0.5, y: 0.5 }, { x: -0.5, y: 0.5 }, { x: 0, y: -0.5 }],
            'circle': (() => { const p = []; for (let i = 0; i <= 32; i++) { const t = (i / 32) * Math.PI * 2; p.push({ x: Math.cos(t) * 0.5, y: Math.sin(t) * 0.5 }); } return p; })(),
            'line': [{ x: -0.5, y: 0 }, { x: 0.5, y: 0 }],
            'star_5-pt': [{ x: 0, y: -0.5 }, { x: 0.12, y: -0.15 }, { x: 0.48, y: -0.15 }, { x: 0.18, y: 0.08 }, { x: 0.29, y: 0.45 }, { x: 0, y: 0.22 }, { x: -0.29, y: 0.45 }, { x: -0.18, y: 0.08 }, { x: -0.48, y: -0.15 }, { x: -0.12, y: -0.15 }, { x: 0, y: -0.5 }],
            'spiral': (() => { const pts = []; for (let i = 0; i <= 100; i++) { const r = (i / 100) * 0.5; const t = (i / 100) * Math.PI * 2 * 3; pts.push({ x: Math.cos(t) * r, y: Math.sin(t) * r }); } return pts; })(),
            'octagon': (() => { const pts = []; for (let i = 0; i <= 8; i++) { const t = (i / 8) * Math.PI * 2 - Math.PI / 8; pts.push({ x: Math.cos(t) * 0.5, y: Math.sin(t) * 0.5 }); } return pts; })(),
            'wavy': (() => { const pts = []; for (let i = 0; i <= 20; i++) { const x = (i / 20) - 0.5; const y = Math.sin(i) * 0.25; pts.push({ x: x, y: y }); } return pts; })(),
            'dots': (() => { const mk = (cx, cy) => { const p = []; for (let i = 0; i <= 12; i++) { const t = (i / 12) * Math.PI * 2; p.push({ x: cx + Math.cos(t) * 0.05, y: cy + Math.sin(t) * 0.05 }); } p.push({ x: null, y: null }); return p; }; return [...mk(-0.2, -0.2), ...mk(0.2, -0.2), ...mk(0, 0.2)]; })(),
            'dot': (() => { const p = []; for (let i = 0; i <= 12; i++) { const t = (i / 12) * Math.PI * 2; p.push({ x: Math.cos(t) * 0.05, y: Math.sin(t) * 0.05 }); } return p; })(),
            'complex': (() => { const pts = []; for (let i = 0; i <= 60; i++) { const t = i * 0.2; pts.push({ x: Math.sin(t) * 0.4, y: Math.cos(t * 3) * 0.4 }); } return pts; })()
        };

        function buildCustomPatternGeometry(pointsData, scale = 10.0) {
            if (!pointsData || pointsData.length < 2) return null;
            const positions = [];
            for (let i = 0; i < pointsData.length - 1; i++) {
                const p1 = pointsData[i]; const p2 = pointsData[i + 1];
                if (p1.x === null || p1.y === null || p2.x === null || p2.y === null) continue;
                positions.push(p1.x * scale, p1.y * scale, 0.0);
                positions.push(p2.x * scale, p2.y * scale, 0.0);
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.center();
            return geometry;
        }

        function createElasticWireframeMaterial(colorHex = 0x00ffcc) {

        class LaserController {

            interpolateRange(inputStr, t) {
                // Linear Interpolation: t=0 -> Start, t=1 -> End
                if (!inputStr) return 0;
                const s = inputStr.toString();
                if (s.includes('-')) {
                    const parts = s.split('-');
                    const start = parseInt(parts[0]);
                    const end = parseInt(parts[1]);
                    return Math.floor(start + (t * (end - start)));
                }
                else if (s.includes(',')) {
                    // For comma lists in scenes, we still random pick but maybe change over time?
                    // For now, let's keep random behavior or map t?
                    // Let's stick to random for commas as it implies discrete choices
                    const parts = s.split(',').map(n => parseInt(n.trim()));
                    return parts[Math.floor(Math.random() * parts.length)];
                }
                return parseInt(s) || 0;
            }

            parseSceneValue(inputStr) {
                if (!inputStr) return 0;
                const s = inputStr.toString();
                if (s.includes('-')) {
                    const parts = s.split('-');
                    const min = parseInt(parts[0]);
                    const max = parseInt(parts[1]);
                    return Math.floor(Math.random() * (max - min + 1)) + min;
                }
                else if (s.includes(',')) {
                    const parts = s.split(',').map(n => parseInt(n.trim()));
                    return parts[Math.floor(Math.random() * parts.length)];
                }
                else {
                    return parseInt(s);
                }
            }

            update(dt, audioLevel, bass, mids, highs, isBeat, intensity = 1.0, strobeActive = false, speedMult = 1.0, isDrop = false, laserSens = 1.0, strobeValue = 0.0) {
                if (!this.config) return;
                this.universe[0] = 0x00;

                if (this.beatPulse === undefined) this.beatPulse = 0;
                if (isBeat) this.beatPulse = 1.0;
                else this.beatPulse *= 0.92; // Decay

                this.movementTime += dt * speedMult * (0.5 + (intensity * audioLevel * 2.0));

                let textCoordsByZone = {};
                if (typeof laserTextAnimation !== 'undefined' && laserTextAnimation.active && laserTextPoints.length > 0) {
                    laserTextAnimation.time += dt;
                    if (laserTextAnimation.time > 0.2) {
                        laserTextAnimation.time = 0;
                        laserTextAnimation.index = (laserTextAnimation.index + 1) % laserTextPoints.length;
                    }
                    const point = laserTextPoints[laserTextAnimation.index];
                    this.config.zones.forEach(zone => {
                        const mapper = this.mappers[zone.id];
                        if (mapper && mapper.active) {
                            textCoordsByZone[zone.id] = mapper.map(point.u, point.v);
                        }
                    });
                }

                // --- VIBE UPGRADE ---
                const rawVibe = analyzeVibe(bass, mids || 0, highs);
                const startModConfig = (this.config && this.config.modifierConfigs) ? this.config.modifierConfigs : {};
                const currentMod = startModConfig[rawVibe] || DEFAULT_MODIFIERS[rawVibe] || DEFAULT_MODIFIERS["clean"];
                let vibeMod = currentMod;

                // Apply Speed Modifier (Moved to after overrides)
                const originalSpeedMult = speedMult;
                speedMult *= 1.0; // Placeholder, applied later

                let vibe = 'mid';
                if (rawVibe === 'aliens') vibe = 'treble_high';
                else if (rawVibe === 'filthy') vibe = 'bass_high';
                else if (rawVibe === 'heavy') vibe = 'high';
                else if (audioLevel < 0.4) vibe = 'chill';

                if (isDrop) vibe = 'drop';

                let mappingList = (this.laserMappings && this.laserMappings[vibe]) ? this.laserMappings[vibe] : [];
                // Fallback for new high states
                if (mappingList.length === 0 && vibe.includes('high')) {
                    mappingList = (this.laserMappings && this.laserMappings['high']) ? this.laserMappings['high'] : [];
                }

                let rawList = [...mappingList];

                if (this.laserMappings) {
                    // FIX: Only add Bass/Treble mappings if energy is HIGH.
                    // This prevents them from firing during Chill/Mid vibes.
                    if (vibe.includes('high') || (intensity * audioLevel > 0.8)) {
                        if (bass > 0.6 && this.laserMappings.bass) rawList.push(...this.laserMappings.bass);
                        if (highs > 0.5 && this.laserMappings.treble) rawList.push(...this.laserMappings.treble);
                    }
                }

                let activeTags = [];
                let activeScenes = [];

                rawList.forEach(item => {
                    if (item && item.toString().startsWith('scene_')) {
                        const sceneId = parseInt(item.replace('scene_', ''));
                        const scene = this.config.scenes ? this.config.scenes.find(s => s.id === sceneId) : null;
                        if (scene) activeScenes.push(scene);
                    } else {
                        activeTags.push(item);
                    }
                });



                // --- AUTOMATION CALCULATIONS ---
                // Calculate automation values once per frame
                const autoTwist = Math.min(255, Math.floor(bass * 255 * 1.5)); // Heavy bass = max twist
                const autoDots = (highs > 0.6) ? Math.min(255, Math.floor(highs * 255)) : 0; // High hats = dots
                const autoGrating = (isDrop || (intensity * audioLevel > 0.8)) ? Math.min(100, Math.floor(audioLevel * 128)) : 0; // Intense movements

                // LFO for Rotation
                const lfoSpeed = 0.5 + (audioLevel * 2.0); // Speed up with music
                const rotLfo = (Math.sin(this.movementTime * lfoSpeed) + 1) / 2; // 0..1
                const autoRotX = Math.floor(rotLfo * 40); // Gentle coin spin 0..40
                const autoRotY = Math.floor(rotLfo * 30); // Gentle flip 0..30

                // --- MODIFIER OVERRIDE LOGIC ---
                // --- MODIFIER OVERRIDE LOGIC ---
                // If a "mod_" tag is present in the mapped tags for this vibe, force that behavioral modifier
                const modifierTag = activeTags.find(t => t.startsWith('mod_'));
                if (modifierTag) {
                    const modName = modifierTag.replace('mod_', '');
                    const availableConfig = (this.config && this.config.modifierConfigs) ? this.config.modifierConfigs : DEFAULT_MODIFIERS;
                    if (availableConfig[modName]) {
                        // console.log(`Applying Modifier Override: ${modName}`);
                        vibeMod = availableConfig[modName];
                    } else if (DEFAULT_MODIFIERS[modName]) {
                        vibeMod = DEFAULT_MODIFIERS[modName];
                    }
                }

                // Apply Speed Modifier (Late apply after override)
                speedMult *= vibeMod.speedMult;

                this.config.zones.forEach((zone, zoneIndex) => {
                    const startAddr = parseInt(zone.address) - 1;
                    const textCoords = textCoordsByZone[zone.id];

                    // Ensure zone state exists with scene tracking
                    const zoneState = this.channelState[`zone_${zone.id}_meta`] || {
                        lastDecision: 0,
                        activeScene: null,
                        activeSceneId: null,
                        sceneVals: {} // Cache for sticky scene values
                    };
                    if (!this.channelState[`zone_${zone.id}_meta`]) this.channelState[`zone_${zone.id}_meta`] = zoneState;

                    let decisionInterval = 4.0 * (1.0 / Math.max(0.1, speedMult));
                    if (isDrop) decisionInterval = 0.5;
                    if (isBeat) decisionInterval *= 0.8;

                    zoneState.lastDecision += dt;

                    // --- SCENE SELECTION LOGIC ---
                    if (zoneState.lastDecision > decisionInterval) {
                        zoneState.lastDecision = 0;
                        const totalItems = activeTags.length + activeScenes.length;

                        let newScene = null;
                        if (totalItems > 0) {
                            const rnd = Math.random() * totalItems;
                            if (rnd < activeScenes.length) {
                                const validScenes = activeScenes.filter(s => s.zoneId === zone.id);
                                if (validScenes.length > 0) {
                                    newScene = validScenes[Math.floor(Math.random() * validScenes.length)];
                                }
                            }
                        }

                        // If scene changed, clear cache to allow new random values
                        if (newScene !== zoneState.activeScene) {
                            zoneState.activeScene = newScene;
                            zoneState.sceneVals = {}; // Reset sticky values
                        }
                    }

                    zone.channels.forEach(ch => {
                        const addr = startAddr + parseInt(ch.offset);
                        let val = 0;
                        const state = this.channelState[`${zone.id}_${ch.id}`];

                        // --- VIBE OVERRIDES ---
                        // Replaced Pattern Override with Generic Force Channel at end of loop (or here if channel matches?)
                        // User wants "Force Channel" to override a specific DMX address.
                        // Since we are iterating zones/channels, we can check if absAddr matches targetChannel.
                        // BUT modifiers specify targetChannel (1-512).
                        // Checking per-channel is efficient.

                        if (vibeMod.forceChannel && vibeMod.targetChannel === addr + 1) { // Addr is 0-indexed, targetChannel is 1-indexed
                            let overrideVal = 0;
                            const min = vibeMod.minVal || 0;
                            const max = vibeMod.maxVal || 0;

                            if (min === max) {
                                overrideVal = min;
                            } else {
                                // Animated (Sawtooth)
                                // Speed depends on vibeMod.speedMult?
                                // Let's use a standard time base.
                                const time = Date.now() * 0.005 * speedMult;
                                const range = max - min;
                                const norm = time % 1.0;
                                overrideVal = min + Math.floor(norm * (range + 1));
                            }
                            this.universe[addr] = overrideVal;
                            return;
                        }
                        if (vibeMod.forceStrobe && ch.name.toLowerCase().includes("strobe")) {
                            this.universe[addr] = vibeMod.strobeSpeed;
                            return;
                        }

                        // --- 1. PRIORITY: TEXT ---
                        if (textCoords) {
                            if (ch.role === 'x_pos') { this.universe[addr] = textCoords.x; return; }
                            if (ch.role === 'y_pos') { this.universe[addr] = textCoords.y; return; }
                            if (ch.role === 'zoom') { this.universe[addr] = ch.inverse ? (ch.max || 255) : (ch.min || 0); return; }
                        }

                        // --- 2. PRIORITY: ACTIVE SCENE (FIXED STICKY VALUES) ---
                        if (zoneState.activeScene && zoneState.activeScene.modifiers && zoneState.activeScene.modifiers[ch.offset]) {
                            const mod = zoneState.activeScene.modifiers[ch.offset];

                            // FIX: SPECIAL HANDLING FOR ZOOM/ROTATION/EFFECT
                            // These should respond to intensity dynamics, not be static loops
                            if (ch.role === 'zoom' || ch.role === 'rotation' || ch.role === 'zoom_2' || ch.role === 'rotation_2') {

                                // AUTO-DETECT MODE FROM CONFIG
                                let mode = 'vari'; // Default
                                if (ch.ranges) {
                                    // Parse value string to find matching range
                                    const valStr = mod.value ? mod.value.toString() : "";
                                    if (valStr.includes('-')) {
                                        const parts = valStr.split('-');
                                        const min = parseInt(parts[0]);
                                        const max = parseInt(parts[1]);
                                        // Find range
                                        const found = ch.ranges.find(r =>
                                            (r.min === min && r.max === max) ||
                                            (r.min === max && r.max === min)
                                        );
                                        if (found) mode = found.mode;
                                    } else {
                                        // If single value, check if it falls within any range?
                                        // Or just assume static if single val?
                                        // Let's stick to 'vari' for ranges, 'static' for single vals by default?
                                        // Actually logic below handles interpolateRange for single val too (it just returns int).
                                        // But if single val, interpolateRange returns static int anyway.
                                    }
                                }

                                if (mode === 'vari') {
                                    // Modified: Add Beat Pulse to Zoom
                                    let base = audioLevel * 0.6;
                                    let kick = this.beatPulse * 0.4;
                                    let sourceVal = Math.min(1.0, (base + kick) * intensity);
                                    val = this.interpolateRange(mod.value, sourceVal);
                                }
                                else if (mode === 'anim') {
                                    // Modified: Rotation Snap on High Energy
                                    if (ch.role.includes('rotation') && audioLevel > 0.5 && isBeat) {
                                        // Snap to random phase
                                        this.rotationPhase = Math.random();
                                    }
                                    let phase = (this.rotationPhase || 0) + (Date.now() * 0.001);
                                    // If high energy, snap/step behavior?
                                    // Let's keep smooth anim but influenced by beat pulse for speed
                                    const cycleT = (Date.now() * 0.001 * (1.0 + (audioLevel + this.beatPulse) * 5.0)) % 1.0;
                                    val = this.interpolateRange(mod.value, cycleT);
                                }
                                else {
                                    // Static: Random pick (Sticky)
                                    // Check if we already picked a value for this channel in this scene session
                                    if (zoneState.sceneVals[ch.id] === undefined) {
                                        zoneState.sceneVals[ch.id] = this.parseSceneValue(mod.value);
                                    }
                                    val = zoneState.sceneVals[ch.id];
                                }
                            }
                            else {
                                // Default Sticky Behavior for patterns, colors, etc.
                                // Check if we already picked a value for this channel in this scene session
                                if (zoneState.sceneVals[ch.id] === undefined) {
                                    zoneState.sceneVals[ch.id] = this.parseSceneValue(mod.value);
                                }
                                val = zoneState.sceneVals[ch.id];
                            }

                            this.universe[addr] = Math.max(0, Math.min(255, val));
                            return;
                        }

                        // --- 3. PRIORITY: FREESTYLE ---
                        let type = ch.type;
                        if (!type) {
                            if (ch.role === 'generic') type = 'variable';
                            else if (ch.ranges && ch.ranges.length > 0) type = 'pattern_ranges';
                            else if (ch.value !== undefined && !['x_pos', 'y_pos', 'grating', 'blanking', 'dots', 'drawing', 'movement', 'twist', 'strobe', 'scale_v', 'scale_h', 'rot_x', 'rot_y'].includes(ch.role)) type = 'static';
                            else if (['dimmer', 'zoom', 'rotation', 'speed', 'x_pos', 'y_pos', 'grating', 'blanking', 'dots', 'drawing', 'movement', 'twist', 'strobe', 'scale_v', 'scale_h', 'rot_x', 'rot_y'].includes(ch.role)) type = 'variable';
                            else type = 'static';
                        }

                        if (type === 'static' || type === 'static_on') {
                            val = (ch.value !== undefined) ? parseInt(ch.value) : (ch.min || 0);
                            if (ch.name.toLowerCase().includes('dimmer')) {
                                // "Snappy" Dimmer Logic: ON or OFF
                                // Trigger if there is a beat OR if audio level is significantly high
                                if (isBeat || audioLevel > 0.4) {
                                    val = (ch.max !== undefined) ? ch.max : 255;
                                } else {
                                    val = 0;
                                }
                            }
                        }
                        else if (type === 'variable' || type === 'variable_linear' || type === 'variable_curve') {
                            let sourceVal = 0;
                            if (ch.role === 'x_pos' || ch.role === 'y_pos') {
                                let visualU = 0.5; let visualV = 0.5;
                                if (audioLevel > 0.05) {
                                    const seed = zoneIndex * 99.0;
                                    const direction = (zoneIndex % 2 === 0) ? 1 : -1;
                                    const radius = 0.35 * Math.min(1.0, audioLevel * intensity);
                                    const t = this.movementTime;
                                    const offsetX = Math.sin(t * direction * 0.5 + seed) * Math.cos(t * 0.3 + seed) * radius;
                                    const offsetY = Math.cos(t * direction * 0.4 + seed) * Math.sin(t * 0.6 + seed) * radius;
                                    visualU += offsetX; visualV += offsetY;
                                }
                                const mapper = this.mappers[zone.id];

        class GhostAudio {
            constructor(maxFreq = 255) {
                this.maxFreq = maxFreq;
                this.bassTarget = 0.5;
                this.midTarget = 0.5;
                this.highTarget = 0.5;
                this.bassValue = 0.0;
                this.midValue = 0.0;
                this.highValue = 0.0;
                this.smoothing = 0.15;
                this.jitterFrequency = 2.0;
                this.lastUpdate = 0;
                this.firstRun = true;
            }

            update(elapsedTime) {
                if (this.firstRun) {
                    this.lastUpdate = elapsedTime;
                    this.firstRun = false;
                    return { audioLevel: 0, bassLevel: 0, midLevel: 0, highLevel: 0 };
                }

                const delta = elapsedTime - this.lastUpdate;
                // Safety clamp: prevents massive jumps if tab was backgrounded or audio mode switched
                const safeDelta = Math.min(delta, 0.1);
                this.lastUpdate = elapsedTime;

                // 1. Update Targets (Slow random walk)
                if (Math.random() < this.jitterFrequency * safeDelta) {
                    this.bassTarget = THREE.MathUtils.lerp(this.bassTarget, Math.random() * 0.5 + 0.3, 0.2);
                    this.midTarget = THREE.MathUtils.lerp(this.midTarget, Math.random() * 0.4 + 0.4, 0.2);
                    this.highTarget = THREE.MathUtils.lerp(this.highTarget, Math.random() * 0.3 + 0.5, 0.2);
                }

                // 2. Smoothly move current values towards targets
                const factor = Math.min(1, safeDelta / this.smoothing);
                this.bassValue = THREE.MathUtils.lerp(this.bassValue, this.bassTarget, factor * 0.5);
                this.midValue = THREE.MathUtils.lerp(this.midValue, this.midTarget, factor * 0.7);
                this.highValue = THREE.MathUtils.lerp(this.highValue, this.highTarget, factor * 0.9);

                // Add tiny sine wave jitter based on time
                const timeJitter = Math.sin(elapsedTime * 10.0) * 0.01;
                this.bassValue = THREE.MathUtils.clamp(this.bassValue + timeJitter, 0.0, 1.0);
                this.midValue = THREE.MathUtils.clamp(this.midValue + timeJitter * 0.5, 0.0, 1.0);
                this.highValue = THREE.MathUtils.clamp(this.highValue + timeJitter * 0.2, 0.0, 1.0);

                // 3. Calculate master audio level
                const level = (this.bassValue * 0.4 + this.midValue * 0.4 + this.highValue * 0.2);

                return {
                    audioLevel: level,
                    bassLevel: this.bassValue,
                    midLevel: this.midValue,
                    highLevel: this.highValue
                };
            }

            reset(currentTime) {
                this.lastUpdate = currentTime;
                this.firstRun = true;
            }

        class BuildupDetector {
            constructor() {
                this.history = [];
                this.buildupConfidence = 0;
                this.isBuildup = false;
                this.duration = 0;
            }

            update(audioLevel, delta) {
                // Track history ~5 seconds
                this.history.push(audioLevel);
                if (this.history.length > 300) this.history.shift(); // 5s at 60fps

                if (this.history.length < 60) return false;

                // Check for positive slope over the history
                // Split history into start and end chunks
                const startChunk = this.history.slice(0, 30);
                const endChunk = this.history.slice(-30);

                const startAvg = startChunk.reduce((a, b) => a + b, 0) / startChunk.length;
                const endAvg = endChunk.reduce((a, b) => a + b, 0) / endChunk.length;

                // If energy is rising consistently
                if (endAvg > startAvg * 1.2 && endAvg > 0.3) {
                    this.buildupConfidence += delta;
                } else {
                    this.buildupConfidence -= delta * 2.0; // Decay faster
                }

                this.buildupConfidence = Math.max(0, Math.min(5.0, this.buildupConfidence));

                // Threshold for "Is Buildup"
                if (this.buildupConfidence > 1.5) {
                    this.isBuildup = true;
                    this.duration += delta;
                } else {
                    this.isBuildup = false;
                    this.duration = 0;
                }

                return this.isBuildup;
            }
        }

        function rotate3D(x, y, z, rx, ry, rz) {
            // Apply X Rotation (scales Y based on angle)
            // rx 0-127: 0=0deg, 64=90deg (flat), 127=180deg (flip)
            const angX = (Math.min(127, rx) / 127.0) * Math.PI;
            const cosX = Math.cos(angX);
            let y1 = y * cosX;

            // Apply Y Rotation (scales X based on angle)
            // ry 0-127: 0=0deg, 64=90deg (flat), 127=180deg (flip)
            const angY = (Math.min(127, ry) / 127.0) * Math.PI;
            const cosY = Math.cos(angY);
            let x1 = x * cosY;

            // Apply Z Rotation (standard 2D rotation)
            // rz 0-255 mapped to -PI to PI
            const angZ = ((rz - 127) / 127) * Math.PI;
            const cosZ = Math.cos(angZ);
            const sinZ = Math.sin(angZ);

            let x2 = x1 * cosZ - y1 * sinZ;
            let y2 = x1 * sinZ + y1 * cosZ;

            return { x: x2, y: y2 };
        }

        function applyTwist(points, amount) {
            if (amount < 5) return points;
            const factor = (amount / 255.0) * 0.02;
            return points.map(p => {
                const dist = Math.sqrt(p.x * p.x + p.y * p.y);
                const angle = factor * dist * 300;
                const cosA = Math.cos(angle);
                const sinA = Math.sin(angle);
                return {
                    x: p.x * cosA - p.y * sinA,
                    y: p.x * sinA + p.y * cosA
                };
            });
        }

        // --- Helper function to resize frustum-filling planes ---
        function autoResizeBgPlane(mesh, aspect, camera) {
            if (!mesh) return;
            const distance = Math.abs(-90 - camera.position.z);
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            const h = 2 * Math.tan(vFOV / 2) * distance;
            const w = h * aspect;
            mesh.scale.set(w, h, 1);
        }

        function spawnShootingLine() {
            // Viewport calc at z=5 (camera dist)
            const dist = 5;
            const vFOV = THREE.MathUtils.degToRad(cameraFg.fov);
            const height = 2 * Math.tan(vFOV / 2) * dist;
            const width = height * cameraFg.aspect;

            const side = Math.floor(Math.random() * 4); // 0:Top, 1:Right, 2:Bottom, 3:Left
            let startX, startY, endX, endY;
            const pad = 1.0; // Start off screen

            if (side === 0) { // Top
                startX = (Math.random() - 0.5) * width; startY = height / 2 + pad;
                endX = (Math.random() - 0.5) * width; endY = -height / 2;
            } else if (side === 1) { // Right
                startX = width / 2 + pad; startY = (Math.random() - 0.5) * height;
                endX = -width / 2; endY = (Math.random() - 0.5) * height;
            } else if (side === 2) { // Bottom
                startX = (Math.random() - 0.5) * width; startY = -height / 2 - pad;
                endX = (Math.random() - 0.5) * width; endY = height / 2;
            } else { // Left
                startX = -width / 2 - pad; startY = (Math.random() - 0.5) * height;
                endX = width / 2; endY = (Math.random() - 0.5) * height;
            }

            const angle = Math.atan2(endY - startY, endX - startX);
            const speed = 10.0; // Base speed

            // Random Vibrant Color
            const color = new THREE.Color().setHSL(Math.random(), 1.0, 0.5);

            shootingLinesData.push({
                x: startX, y: startY,
                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                angle: angle,
                active: true,
                targetX: endX, targetY: endY,
                startSide: side,
                color: color // Store color
            });
        }

        function updateFgShootingLines(delta, elapsedTime, audioLevel, intensity, isBeat) {
            if (!fgShootingLinesMesh || !fgShootingLinesMesh.visible) return;

            // 1. Spawning
            const activeLines = shootingLinesData.filter(l => l.active).length;
            if (activeLines < MAX_SHOOTING_LINES) {
                if (isBeat || Math.random() < (0.005 + 0.03 * intensity * audioLevel)) {
                    spawnShootingLine();
                }
            }

            // Viewport dims
            const dist = 5;
            const vFOV = THREE.MathUtils.degToRad(cameraFg.fov);
            const viewH = 2 * Math.tan(vFOV / 2) * dist;
            const viewW = viewH * cameraFg.aspect;

            // USE GLOBAL DUMMY
            const dummy = shootingLinesDummy;

            // 2. Update Lines
            let lineIdx = 0;
            const currentW = SHOOTING_LINE_BASE_WIDTH * (1.0 + audioLevel * intensity * 1.5);
            const currentL = currentW * 4.0;

            for (let i = shootingLinesData.length - 1; i >= 0; i--) {
                let l = shootingLinesData[i];
                l.x += l.vx * delta * speedMultiplier;
                l.y += l.vy * delta * speedMultiplier;

                let hit = false;
                if (l.startSide === 0 && l.y < -viewH / 2) hit = true;
                else if (l.startSide === 1 && l.x < -viewW / 2) hit = true;
                else if (l.startSide === 2 && l.y > viewH / 2) hit = true;
                else if (l.startSide === 3 && l.x > viewW / 2) hit = true;

                if (hit) {
                    const blockCount = Math.min(25, Math.floor(currentL * 4));
                    let spawnedCount = 0;

                    // Cycle through pool starting at nextDebrisIndex
                    for (let k = 0; k < MAX_DEBRIS && spawnedCount < blockCount; k++) {
                        const debris = shootingDebrisData[nextDebrisIndex];
                        nextDebrisIndex = (nextDebrisIndex + 1) % MAX_DEBRIS;

                        // Force activate particle
                        debris.active = true;
                        debris.x = l.x + (Math.random() - 0.5) * currentL;
                        debris.y = l.y + (Math.random() - 0.5) * currentL;
                        debris.vx = (Math.random() - 0.5) * 10.0;
                        debris.vy = (Math.random() - 0.5) * 10.0;
                        debris.rot = Math.random() * Math.PI;
                        debris.rotSpeed = (Math.random() - 0.5) * 10.0;
                        debris.scale = currentW * 0.4;
                        debris.color = l.color;
                        spawnedCount++;
                    }
                    shootingLinesData.splice(i, 1);
                } else {
                    dummy.position.set(l.x, l.y, -5);
                    dummy.rotation.z = l.angle;
                    dummy.scale.set(currentL, currentW, 1);
                    dummy.updateMatrix();
                    fgShootingLinesMesh.setMatrixAt(lineIdx, dummy.matrix);

                    if (!l.color) l.color = new THREE.Color(1, 1, 1);
                    fgShootingLinesMesh.setColorAt(lineIdx, l.color);

                    lineIdx++;
                }
            }

            for (let j = lineIdx; j < MAX_SHOOTING_LINES; j++) {
                dummy.position.set(0, 0, 100); dummy.scale.set(0, 0, 0); dummy.updateMatrix();
                fgShootingLinesMesh.setMatrixAt(j, dummy.matrix);
            }
            fgShootingLinesMesh.instanceMatrix.needsUpdate = true;
            if (fgShootingLinesMesh.instanceColor) fgShootingLinesMesh.instanceColor.needsUpdate = true;

            // 3. Update Debris
            let debrisIdx = 0;
            shootingDebrisData.forEach(d => {
                if (d.active) {
                    d.vy -= 15.0 * delta;
                    d.x += d.vx * delta * speedMultiplier;
                    d.y += d.vy * delta * speedMultiplier;
                    d.rot += d.rotSpeed * delta;
                    if (d.y < -viewH / 2 - 2.0) d.active = false;

                    dummy.position.set(d.x, d.y, -5);
                    dummy.rotation.z = d.rot;
                    dummy.scale.set(d.scale, d.scale, 1);
                    dummy.updateMatrix();
                    fgShootingDebrisMesh.setMatrixAt(debrisIdx, dummy.matrix);
                    if (d.color) fgShootingDebrisMesh.setColorAt(debrisIdx, d.color);
                    else fgShootingDebrisMesh.setColorAt(debrisIdx, new THREE.Color(1, 1, 1));
                    debrisIdx++;
                }
            });

            for (let j = debrisIdx; j < MAX_DEBRIS; j++) {
                dummy.position.set(0, 0, 100); dummy.scale.set(0, 0, 0); dummy.updateMatrix();
                fgShootingDebrisMesh.setMatrixAt(j, dummy.matrix);
            }
            fgShootingDebrisMesh.instanceMatrix.needsUpdate = true;
            if (fgShootingDebrisMesh.instanceColor) fgShootingDebrisMesh.instanceColor.needsUpdate = true;

            if (shootingLinesMat) {
                shootingLinesMat.uniforms.u_audioLevel.value = audioLevel;
                shootingLinesMat.uniforms.u_intensity.value = intensity;
            }
        }

        async function setAudioMode(mode) {
            hideInfoOverlay();

            if (audioContext) {
                if (microphoneSource) microphoneSource.disconnect();
                if (analyser) analyser.disconnect();
                await audioContext.close().catch(e => console.error(e));
                audioContext = null;
                microphoneSource = null;
                analyser = null;
            }

            audioMode = mode;

            micBtn.classList.remove('active');
            micBtn.textContent = 'Mic Off';
            micBtn.style.backgroundColor = '';

            sysAudioBtn.classList.remove('active');
            sysAudioBtn.classList.remove('fx-active');

            if (audioMode === 0) {
                // --- OFF (Ghost Mode) ---
                isMicEnabled = false;
                audioLevel = 0; bassLevel = 0; midLevel = 0; highLevel = 0;

                // FIX: Reset ghost audio timing so it doesn't jump
                if (ghostAudio && clock) ghostAudio.reset(clock.getElapsedTime());

                return;
            }

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                let stream;

                if (audioMode === 1) {
                    // --- MIC MODE ---
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micBtn.textContent = 'Mic On';
                    micBtn.classList.add('active');
                } else if (audioMode === 2) {
                    // --- SYSTEM AUDIO MODE ---
                    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });

                    if (stream.getAudioTracks().length === 0) {
                        throw new Error("No system audio shared. Did you check the 'Share Audio' box?");
                    }

                    stream.getVideoTracks().forEach(track => track.stop());

                    sysAudioBtn.classList.add('active');
                    sysAudioBtn.classList.add('fx-active');
                }

                microphoneSource = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                microphoneSource.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isMicEnabled = true;
                if (noSleepVideo && noSleepVideo.paused) { noSleepVideo.play().catch(e => { }); }

            } catch (err) {
                console.error('Audio access failed:', err);

                audioMode = 0;
                isMicEnabled = false;

                let msg = "Audio access denied.";
                if (err.message.includes("No system audio")) msg = "No audio track found. Make sure to check 'Share Audio' in the popup.";

                infoOverlay.innerHTML = msg;
                infoOverlay.style.opacity = '1';
                infoOverlay.style.display = 'block';
                setTimeout(hideInfoOverlay, 4000);
            }
        }

        function updateAudioLevel() {
            if (isMicEnabled && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
                let avg = sum / dataArray.length;

                // --- AGC (Device Audio & Mic) ---
                let normFactor = 1.0;
                if (audioMode === 1 || audioMode === 2) {
                    const currentAmp = avg / 255.0;

                    // 1. UPDATE PEAK TRACKING
                    if (currentAmp > agcPeak) {
                        agcPeak = currentAmp;
                    } else {
                        // Slow decay
                        agcPeak -= 0.0002;
                    }

                    // 2. SET MINIMUM FLOOR
                    if (agcPeak < 0.4) agcPeak = 0.4;

                    // 3. SET TARGET LEVEL
                    normFactor = 0.5 / agcPeak;
                }

                let rawAvg = Math.pow((avg * normFactor) / 128.0, 2);
                rawAudioLevel = Math.min(1.0, rawAvg);
                audioLevel = Math.min(1.0, rawAvg * sensitivity);

                const nyquist = audioContext.sampleRate / 2;
                const freqBinCount = analyser.frequencyBinCount;
                const bassEndIdx = Math.max(1, Math.floor(250 / (nyquist / freqBinCount)));
                const midEndIdx = Math.max(bassEndIdx + 1, Math.floor(2000 / (nyquist / freqBinCount)));
                const highEndIdx = freqBinCount;
                // --- BASS ---
                let bassSum = 0;
                for (let i = 0; i < bassEndIdx; i++) { bassSum += dataArray[i]; }
                bassSum *= normFactor;

                let rawBass = (bassSum / bassEndIdx / 255.0);

                // [FIX] Capture history for Flux
                lastRawBassLevel = rawBassLevel;

                rawBassLevel = Math.min(1.0, rawBass);
                bassLevel = Math.min(1.0, rawBass * sensitivity); // [FIX] Ensure sensitivity applied

                // --- MIDS ---
                let midSum = 0;
                let midDenom = (midEndIdx - bassEndIdx);
                for (let i = bassEndIdx; i < midEndIdx; i++) { midSum += dataArray[i]; }
                midSum *= normFactor;

                let rawMid = (midDenom > 0) ? (midSum / midDenom / 128.0) : 0;

                // [FIX] Capture history for Flux
                lastRawMidLevel = rawMidLevel;

                rawMidLevel = Math.min(1.0, rawMid);
                midLevel = Math.min(1.0, rawMid * sensitivity);

                // --- HIGHS ---
                let highSum = 0;
                let highDenom = (highEndIdx - midEndIdx);
                for (let i = midEndIdx; i < highEndIdx; i++) { highSum += dataArray[i]; }
                highSum *= normFactor;

                let rawHigh = (highDenom > 0) ? ((highSum / highDenom / 128.0) * 1.1) : 0;

                // [FIX] Capture history for Flux
                lastRawHighLevel = rawHighLevel;

                rawHighLevel = Math.min(1.0, rawHigh);
                highLevel = Math.min(1.0, rawHigh * sensitivity);


                bassLevel = isNaN(bassLevel) ? 0 : bassLevel; midLevel = isNaN(midLevel) ? 0 : midLevel; highLevel = isNaN(highLevel) ? 0 : highLevel;
            } else {
                // --- GHOST AUDIO IMPLEMENTATION ---
                const ghostData = ghostAudio.update(clock.getElapsedTime());

                rawAudioLevel = ghostData.audioLevel;
                rawBassLevel = ghostData.bassLevel;
                rawMidLevel = ghostData.midLevel;
                rawHighLevel = ghostData.highLevel;

                audioLevel = ghostData.audioLevel * sensitivity;
                bassLevel = ghostData.bassLevel * sensitivity;
                midLevel = ghostData.midLevel * sensitivity;
                highLevel = ghostData.highLevel * sensitivity;

                // Ensure all values are clamped to the 0-1 range after applying sensitivity
                audioLevel = THREE.MathUtils.clamp(audioLevel, 0, 1);
                bassLevel = THREE.MathUtils.clamp(bassLevel, 0, 1);
                midLevel = THREE.MathUtils.clamp(midLevel, 0, 1);
                highLevel = THREE.MathUtils.clamp(highLevel, 0, 1);
            }
        }

        function handleStrobe(isBeat, delta) {
            // Logic independent of strobeEnabled
            if (internalStrobeValue > 0) {
                internalStrobeValue = Math.max(0, internalStrobeValue - (2.0 * delta));
            }

            if (isBeat) {
                strobeBeatCount++;
                let interval = 4;
                if (strobeSensitivity > 2.5) interval = 1;
                else if (strobeSensitivity > 1.5) interval = 2;
                else if (strobeSensitivity < 0.8) interval = 8;

                if (strobeBeatCount % interval === 0) {
                    internalStrobeValue = 0.8; // Max intensity
                }
            }

            // UI Overlay Update
            if (strobeEnabled) {
                if (internalStrobeValue > 0.01 && isBeat && (strobeBeatCount % (strobeSensitivity > 2.5 ? 1 : (strobeSensitivity > 1.5 ? 2 : (strobeSensitivity < 0.8 ? 8 : 4))) === 0)) {
                    let color = (selectedStrobeColor === 'random') ? '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0') : selectedStrobeColor;
                    strobeOverlay.style.backgroundColor = color;
                }
                strobeOverlay.style.opacity = internalStrobeValue.toFixed(2);
            } else {
                strobeOverlay.style.opacity = '0';
            }

            return internalStrobeValue;
        }



        function updateFgRadiantMandala(delta, elapsedTime, audioLevel, intensity) {
            if (!fgRadiantMandala || !fgRadiantMandala.visible) return;
            const e = elapsedTime * speedMultiplier;
            const a = audioLevel;
            const i = intensity;
            fgRadiantMandala.rotation.z = e * 0.1 + Math.sin(e * 0.2) * 0.2 + (bassLevel || 0) * 0.3;
            const s = 1.2 + Math.sin(e * 0.5) * 0.1 + a * 1.2 * i;
            fgRadiantMandala.scale.setScalar(s);
            const count = fgRadiantMandala.children.length;
            fgRadiantMandala.children.forEach((line, idx) => {
                line.material.color.setHSL((e * 0.2 + idx / count) % 1, 0.8, 0.6);
            });
        }

        function updateFgTorusKnot(delta, elapsedTime, audioLevel, intensity) {
            if (!fgTorusKnot || !fgTorusKnot.visible) return;
            const e = elapsedTime * speedMultiplier;
            const a = audioLevel;
            const i = intensity;
            fgTorusKnot.rotation.x = e * 0.2;
            fgTorusKnot.rotation.y = e * 0.3;
            const s = 1 + a * 0.8 * i;
            fgTorusKnot.scale.set(s, s, s);
            fgTorusKnot.material.color.setHSL((e * 0.1) % 1, 0.8, 0.6);
        }

        function updateFgGameOfLife(delta, elapsedTime, audioLevel, intensity, isBeat) {
            if (!fgGameOfLife || !fgGameOfLife.visible) return;
            const e = elapsedTime * speedMultiplier;
            const a = audioLevel;
            const i = intensity;

            const gridWidth = 80, gridHeight = 45;

            // 1. Audio-Reactive Injection: Keep the simulation alive!
            if (isBeat || (Math.random() < 0.01 * i * a)) {
                const numSparks = isBeat ? 4 : 1;
                for (let s = 0; s < numSparks; s++) {
                    const cx = Math.floor(Math.random() * gridWidth);
                    const cy = Math.floor(Math.random() * gridHeight);
                    for (let oy = -1; oy <= 1; oy++) {
                        for (let ox = -1; ox <= 1; ox++) {
                            const tx = (cx + ox + gridWidth) % gridWidth;
                            const ty = (cy + oy + gridHeight) % gridHeight;
                            if (Math.random() > 0.5) fgGameOfLifeGrid[ty][tx] = 1;
                        }
                    }
                }
            }

            fgGameOfLifeTimer += delta;
            const updateInterval = Math.max(0.05, 0.18 - (a * i * 0.12));

            if (fgGameOfLifeTimer > updateInterval) {
                fgGameOfLifeTimer = 0;
                const newGrid = fgGameOfLifeGrid.map(arr => [...arr]);
                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        let n = 0;
                        for (let i = -1; i <= 1; i++)
                            for (let j = -1; j <= 1; j++) {
                                if (i === 0 && j === 0) continue;
                                n += fgGameOfLifeGrid[(y + i + gridHeight) % gridHeight][(x + j + gridWidth) % gridWidth];
                            }
                        if (fgGameOfLifeGrid[y][x] === 1 && (n < 2 || n > 3)) newGrid[y][x] = 0;
                        else if (fgGameOfLifeGrid[y][x] === 0 && n === 3) newGrid[y][x] = 1;
                    }
                }
                fgGameOfLifeGrid = newGrid;
            }

            let instIdx = 0;
            const planeSize = 0.4;
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    fgGameOfLifeDummy.position.set((x - gridWidth / 2) * planeSize, (y - gridHeight / 2) * planeSize, -5);
                    fgGameOfLifeDummy.scale.setScalar(fgGameOfLifeGrid[y][x] === 1 ? 1 : 0);
                    fgGameOfLifeDummy.updateMatrix();
                    fgGameOfLife.setMatrixAt(instIdx, fgGameOfLifeDummy.matrix);
                    fgGameOfLifeColor.setHSL((e * 0.1 + (x + y) * 0.01) % 1, 0.8, 0.5);
                    fgGameOfLife.setColorAt(instIdx, fgGameOfLifeColor);
                    instIdx++;
                }
            }
            fgGameOfLife.instanceMatrix.needsUpdate = true;
            if (fgGameOfLife.instanceColor) fgGameOfLife.instanceColor.needsUpdate = true;
        }

        function handleAutoMode(delta, audioLevel, bass, highs, isBeat, isDrop, mids, flux) {            // Track sustained intensity
            if (audioLevel > 0.5) {
                sustainedIntenseTimer += delta;
            } else {
                sustainedIntenseTimer = 0;
            }

            // 1. Timer Logic
            if (isDrop) {
                randomModeTimer = randomModeInterval;
            }
            let timeScale = 0.5 + (audioLevel * 1.5);
            if (isBeat) timeScale += 1.0;
            randomModeTimer += delta * timeScale;

            // 2. Determine Energy State
            let midBias = 50;
            if (laserController.config && laserController.config.midVibeBias !== undefined) {
                midBias = laserController.config.midVibeBias;
            }
            const biasFactor = (midBias - 50) / 50.0;

            // Retrieve user setting from Vibe Mapper (Default to 0.7 if not set)
            let userBassThresh = 0.7;
            if (laserController.config && laserController.config.bassThreshold !== undefined) {
                userBassThresh = laserController.config.bassThreshold;
            }

            // --- STRATEGY SWITCH ---
            let checkBass, checkAudio, checkHighs;
            let bThresh, aHighThresh, aMidThresh, hThresh;

            if (isMicEnabled) {
                // STRATEGY A: MICROPHONE (Coupled to Slider)
                checkBass = bass;
                checkAudio = audioLevel;
                checkHighs = highs;

                // Standard Thresholds
                bThresh = 0.7 + (biasFactor * 0.1);
                aHighThresh = 0.75 + (biasFactor * 0.1);
                aMidThresh = 0.4 - (biasFactor * 0.15);
                hThresh = 0.5 - (biasFactor * 0.15);

            } else {
                // STRATEGY B: DEVICE AUDIO (Decoupled / AGC)
                // We use RAW globals to avoid Sensitivity Trap
                checkBass = rawBassLevel;
                checkAudio = rawAudioLevel;
                checkHighs = rawHighLevel;

                // Thresholds tuned for AGC normalization
                bThresh = userBassThresh + (biasFactor * 0.1);
                aHighThresh = 0.85 + (biasFactor * 0.1);
                aMidThresh = 0.4 - (biasFactor * 0.15);
                hThresh = 0.5 - (biasFactor * 0.15);
            }

            // 3. Perform Checks
            let energyState = 'chill';

            const isHighEnergy = (checkBass > bThresh || checkAudio > aHighThresh);
            const isMidEnergy = (checkHighs > hThresh || checkAudio > aMidThresh);

            if (isHighEnergy) {
                if (checkBass > bThresh) energyState = 'bass_high';
                else energyState = 'treble_high';
            } else if (isMidEnergy) {
                energyState = 'mid';
            }

            if (isDrop) {
                // Force timer to expire immediately to trigger a visual switch
                randomModeTimer = randomModeInterval + 1.0;
                // We DO NOT set energyState to 'drop' to avoid looking for an empty 'drop' bucket.
                // Instead, we let the logic below pick 'high' or 'mid' based on the audio.
                // However, drops usually imply high energy, so we can bias it:
                if (energyState === 'chill') energyState = 'mid';
            }

            // Update Vibe Text
            const vibeEl = document.getElementById('debug-vibe');
            if (vibeEl) vibeEl.innerText = `Vibe: ${energyState}`;

            // Render Laser Overlay
            renderOverlay();

            // 4. Switching Logic
            // FIX: Disable auto-switching in Ghost Mode (Audio Mode 0) so user has full manual control
            if (audioMode !== 0 && (isDrop || randomModeTimer >= randomModeInterval)) {
                randomModeTimer = 0.8;

                // Safety check: if visualMappings is empty/undefined, do nothing

                let pool = visualMappings[energyState];
                // Fallback for new states
                if (!pool && energyState === 'bass_high') pool = visualMappings['high'];
                if (!pool && energyState === 'treble_high') pool = visualMappings['high'];

                if (!pool) pool = visualMappings['mid'];
                if (!pool) return;

                if (!isDrop && Math.random() < 0.3) {
                    const otherState = Math.random() > 0.5 ? 'mid' : 'chill';
                    const otherPool = visualMappings[otherState] || visualMappings['chill'];

                    if (otherPool) {
                        if (Math.random() > 0.5) {
                            if (otherPool.bg && otherPool.bg.length > 0) currentBgMode = otherPool.bg[Math.floor(Math.random() * otherPool.bg.length)];
                        } else {
                            if (otherPool.fg && otherPool.fg.length > 0) currentFgMode = otherPool.fg[Math.floor(Math.random() * otherPool.fg.length)];
                        }
                    }
                } else {
                    if (pool.bg && pool.bg.length > 0) currentBgMode = pool.bg[Math.floor(Math.random() * pool.bg.length)];
                    if (pool.fg && pool.fg.length > 0) currentFgMode = pool.fg[Math.floor(Math.random() * pool.fg.length)];
                }

                if (energyState === 'high' && Math.random() > 0.3) currentOvMode = 5;
                else if (pool.ov && pool.ov.length > 0) currentOvMode = pool.ov[Math.floor(Math.random() * pool.ov.length)];

                // With this:
                // FIX: Removed 40% random chance. Now strictly follows Config Checkboxes.
                // If "Off" (Index 0) is unchecked in setup, effects will ALWAYS stay on.
                if (pool.fx && pool.fx.length > 0) {
                    currentFxMode = pool.fx[Math.floor(Math.random() * pool.fx.length)];
                } else {
                    currentFxMode = 0;
                }

                updateBgModeUI();
                updateFgModeUI();
                updateOvModeUI();
                updateFxModeUI();
                updateLayerVisibility();
            }
        }

        // --- SMART MODIFIER LINKING ---
        function findLinkedChannel(zone, role, parentName) {
            // 1. Get all channels with the requested role (e.g., 'zoom')
            const candidates = zone.channels.filter(c => c.role === role);
            if (candidates.length === 0) return null;

            // 2. Try to match the "Head" identifier (H1, H2, A, B, etc.)
            // We look for common identifiers in the Pattern's name.
            const parentNameLower = parentName.toLowerCase();

            // Heuristic: Does the pattern name have "h1", "h2", "l1", "l2"?
            // We try to find a modifier that shares that string.
            let bestMatch = candidates.find(c => {
                const cName = c.name.toLowerCase();
                // Check specific markers
                if (parentNameLower.includes('h1') && cName.includes('h1')) return true;
                if (parentNameLower.includes('h2') && cName.includes('h2')) return true;
                if (parentNameLower.includes('head 1') && cName.includes('head 1')) return true;
                if (parentNameLower.includes('head 2') && cName.includes('head 2')) return true;
                return false;
            });

            // 3. Return match, or fallback to the first candidate found
            return bestMatch || candidates[0];
        }
